function journalMonthlyHTML() {
  const map = {};
  allClosedTrades().forEach(t => {
    const d = new Date(t.closedAt);
    if (isNaN(d.getTime())) return;
    const k = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
    (map[k] = map[k] || []).push(t);
  });
  const keys = Object.keys(map).sort((a, b) => b.localeCompare(a));
  if (!keys.length) return emptyJournal('No closed trades yet', 'Close trades to build your monthly view.');

  return keys.map(k => {
    const trades = map[k].slice().sort((a, b) => new Date(a.closedAt) - new Date(b.closedAt));
    const [yr, mo] = k.split('-').map(Number);
    const label = new Date(yr, mo - 1, 1).toLocaleString('en-IN', { month: 'long', year: 'numeric' });
    const net = trades.reduce((s, t) => s + netPnl(t), 0);
    const wins = trades.filter(t => netPnl(t) > 0).length;
    const wr = trades.length ? Math.round(wins / trades.length * 100) : 0;
    const gainPcts = trades.map(tradeGainPct).filter(v => v !== null);
    const avgGain = gainPcts.length ? gainPcts.reduce((a, b) => a + b, 0) / gainPcts.length : 0;
    // cumulative equity within the month for the sparkline
    let cum = 0;
    const pts = trades.map(t => (cum += netPnl(t)));
    return `
      <div class="card" style="margin-bottom: 14px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
          <h3 class="card-title">${label}</h3>
          <span class="mono ${pnlClass(net)}" style="font-weight:700;">${formatPnl(net)}</span>
        </div>
        <div class="metric-row" style="margin-bottom:10px;">
          <div class="metric"><div class="m-label">Profit</div><div class="m-value ${pnlClass(net)}" style="font-size:15px;">${formatPnl(net)}</div></div>
          <div class="metric"><div class="m-label">Wins (%)</div><div class="m-value">${wr}%</div></div>
          <div class="metric"><div class="m-label">Avg gain (%)</div><div class="m-value ${pnlClass(avgGain)}">${avgGain >= 0 ? '+' : ''}${avgGain.toFixed(2)}%</div></div>
        </div>
        ${sparklineSVG(pts)}
      </div>
    `;
  }).join('');
}

// Lightweight inline equity sparkline.
function sparklineSVG(pts) {
  if (!pts || pts.length < 2) return '';
  const w = 480, h = 70, pad = 4;
  const min = Math.min(0, ...pts), max = Math.max(0, ...pts);
  const range = (max - min) || 1;
  const stepX = (w - pad * 2) / (pts.length - 1);
  const y = (v) => h - pad - ((v - min) / range) * (h - pad * 2);
  const d = pts.map((v, i) => `${i === 0 ? 'M' : 'L'} ${(pad + i * stepX).toFixed(1)} ${y(v).toFixed(1)}`).join(' ');
  const last = pts[pts.length - 1];
  const color = last >= 0 ? 'var(--success)' : 'var(--error)';
  const zeroY = y(0).toFixed(1);
  return `<svg class="jspark" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <line x1="${pad}" y1="${zeroY}" x2="${w - pad}" y2="${zeroY}" stroke="var(--border)" stroke-width="1" stroke-dasharray="3 3"/>
    <path d="${d}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
  </svg>`;
}

function emptyJournal(title, desc) {
  return `<div class="empty-state"><div class="empty-state-icon">📓</div><div class="empty-state-title">${title}</div><div class="empty-state-desc">${desc}</div></div>`;
}

// ---- Journal Calendar view (Sun-first grid + weekly totals column) ----
function journalCalendarHTML() {
  const year = calendarMonth.getFullYear();
  const month = calendarMonth.getMonth();
  const monthName = calendarMonth.toLocaleString('en-IN', { month: 'long', year: 'numeric' });
  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0);
  const startDow = firstDay.getDay(); // Sun=0
  const daysInMonth = lastDay.getDate();
  const today = new Date();

  const dayMap = {};
  allClosedTrades().forEach(t => {
    const d = new Date(t.closedAt);
    if (d.getFullYear() === year && d.getMonth() === month) {
      const k = d.getDate();
      if (!dayMap[k]) dayMap[k] = { pnl: 0, count: 0 };
      dayMap[k].pnl += netPnl(t);
      dayMap[k].count++;
    }
  });

  // Build cells (leading blanks + days), then chunk into weeks of 7 for weekly totals.
  const cells = [];
  for (let i = 0; i < startDow; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);
  while (cells.length % 7 !== 0) cells.push(null);

  const dows = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  let head = dows.map(d => `<div class="jcal-h">${d}</div>`).join('') + `<div class="jcal-h">Week</div>`;

  let body = '';
  for (let w = 0; w < cells.length / 7; w++) {
    const week = cells.slice(w * 7, w * 7 + 7);
    let weekPnl = 0, weekCount = 0;
    body += week.map(d => {
      if (!d) return `<div class="jcal-cell empty"></div>`;
      const info = dayMap[d];
      const isToday = today.getFullYear() === year && today.getMonth() === month && today.getDate() === d;
      let cls = 'jcal-cell';
      if (info) { weekPnl += info.pnl; weekCount += info.count; cls += info.pnl > 0 ? ' pos' : (info.pnl < 0 ? ' neg' : ''); }
      if (isToday) cls += ' today';
      return `<div class="${cls}">
        <div class="jcal-num">${d}</div>
        ${info ? `<div class="jcal-pnl">${info.pnl >= 0 ? '+' : '-'}${shortMoney(Math.abs(info.pnl))}</div><div class="jcal-cnt">${info.count} trade${info.count === 1 ? '' : 's'}</div>` : ''}
      </div>`;
    }).join('') + `<div class="jcal-cell wk ${weekCount ? (weekPnl >= 0 ? 'pos' : 'neg') : ''}">
        ${weekCount ? `<div class="jcal-pnl">${weekPnl >= 0 ? '+' : '-'}${shortMoney(Math.abs(weekPnl))}</div><div class="jcal-cnt">${weekCount} trade${weekCount === 1 ? '' : 's'}</div>` : ''}
      </div>`;
  }

  const monthTotal = Object.values(dayMap).reduce((s, x) => s + x.pnl, 0);
  const monthCount = Object.values(dayMap).reduce((s, x) => s + x.count, 0);

  return `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
      <button class="btn btn-ghost btn-sm" onclick="shiftJournalCal(-1)">‹</button>
      <div style="font-weight:700;font-size:16px;">${monthName}</div>
      <button class="btn btn-ghost btn-sm" onclick="shiftJournalCal(1)">›</button>
    </div>
    <div class="jcal-grid">${head}${body}</div>
    <div style="display:flex;gap:20px;margin-top:14px;font-size:12px;">
      <div><span style="color:var(--text-muted);">Month total:</span> <span class="mono ${pnlClass(monthTotal)}" style="font-weight:700;">${formatPnl(monthTotal)}</span></div>
      <div><span style="color:var(--text-muted);">Trades:</span> <span class="mono" style="font-weight:700;">${monthCount}</span></div>
    </div>
  `;
}

function shiftJournalCal(delta) {
  calendarMonth = new Date(calendarMonth.getFullYear(), calendarMonth.getMonth() + delta, 1);
  renderJournal();
}

// Compact money formatting for calendar cells (e.g. 23.4K).
function shortMoney(n) {
  const a = Math.abs(n);
  if (a >= 1e7) return '₹' + (n / 1e7).toFixed(1) + 'Cr';
  if (a >= 1e5) return '₹' + (n / 1e5).toFixed(1) + 'L';
  if (a >= 1e3) return '₹' + (n / 1e3).toFixed(1) + 'K';
  return '₹' + Math.round(n);
}

      </div>

function openDayNote(key) {
  const existing = (state.journalNotes || {})[key] || '';
  const d = new Date(key + 'T00:00:00');
  showModal({
    title: `Note — ${d.toLocaleString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' })}`,
    body: `<div class="form-group"><label class="form-label">Journal note</label><textarea class="form-textarea" id="dayNoteInput" rows="5" placeholder="What happened today? Mistakes, emotions, lessons...">${escapeHtml(existing)}</textarea></div>`,
    footer: `<button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn" id="saveDayNoteBtn">Save Note</button>`
  });
  document.getElementById('saveDayNoteBtn').onclick = async () => {
    const val = document.getElementById('dayNoteInput').value.trim();
    if (!state.journalNotes) state.journalNotes = {};
    if (val) state.journalNotes[key] = val; else delete state.journalNotes[key];
    await saveState();
    closeModal();
    renderJournal();
    showToast('Note saved', 'success');

function renderTrades() {
  const allTags = new Set();

  document.getElementById('panel-trades').innerHTML = `
    <div class="page-header">
      <div>
        <h1 class="page-title">Trades</h1>
        <p class="page-subtitle">All your positions and history</p>

    <div class="sub-tabs">

      <button class="sub-tab-btn ${activeSubTab.trades === 'satellite-closed' ? 'active' : ''}" onclick="setSubTab('trades','satellite-closed')">Satellite Closed</button>
      <button class="sub-tab-btn ${activeSubTab.trades === 'core' ? 'active' : ''}" onclick="setSubTab('trades','core')">Core Holdings</button>
      <button class="sub-tab-btn ${activeSubTab.trades === 'core-closed' ? 'active' : ''}" onclick="setSubTab('trades','core-closed')">Core Closed</button>
    </div>

    <div id="tradesContent"></div>

}

function setSubTab(group, value) {
  activeSubTab[group] = value;
  if (group === 'trades') renderTrades();
  if (group === 'wl') renderWatchlist();
}

function renderTradesContent(tags) {
  const container = document.getElementById('tradesContent');
  if (activeSubTab.trades === 'core') {
    container.innerHTML = renderCorePortfolio();
    return;
  }
  if (activeSubTab.trades === 'core-closed') {
    container.innerHTML = renderCoreClosedList();
    return;
  }
  const status = activeSubTab.trades === 'satellite-open' ? 'open' : 'closed';
  let trades = state.trades.filter(t => t.portfolioType === 'satellite' && t.status === status);
  if (tradeFilter.tags.length) trades = trades.filter(t => tradeFilter.tags.some(tag => (t.tags || []).includes(tag)));

  // Sort
  const sortKey = tradeFilter.sort.key, dir = tradeFilter.sort.dir === 'desc' ? -1 : 1;
  trades.sort((a, b) => {
    let av, bv;
    if (sortKey === 'date') { av = new Date(a.entryDate || 0); bv = new Date(b.entryDate || 0); }
    else if (sortKey === 'pnl') { av = Number(a.realizedPnl) || 0; bv = Number(b.realizedPnl) || 0; }
    else if (sortKey === 'symbol') { av = a.symbol; bv = b.symbol; }
    if (av < bv) return -1 * dir;
    if (av > bv) return 1 * dir;
    return 0;
  });

  let html = '';

  // Filter + Sort — collapsed into two dropdowns
  const sortLabel = { date: 'Date', pnl: 'P&L', symbol: 'Symbol' };
  html += `<div class="ts-bar">
    ${tags.length ? `<div class="ts-dd">
      <button class="ts-btn ${tradeFilter.tags.length ? 'active' : ''}" onclick="toggleTradeMenu('filter')">Filter${tradeFilter.tags.length ? ' · ' + tradeFilter.tags.length : ''} <span class="ts-caret">▾</span></button>
      ${tradeFilter.openMenu === 'filter' ? `<div class="ts-menu">
        <button class="ts-item ${tradeFilter.tags.length === 0 ? 'active' : ''}" onclick="clearTradeTags()"><span>All</span>${tradeFilter.tags.length === 0 ? '<span>✓</span>' : ''}</button>
        ${tags.map(t => `<button class="ts-item ${tradeFilter.tags.includes(t) ? 'active' : ''}" onclick="toggleTradeTag('${escapeHtml(t)}')"><span>${escapeHtml(t)}</span>${tradeFilter.tags.includes(t) ? '<span>✓</span>' : ''}</button>`).join('')}
      </div>` : ''}
    </div>` : ''}
    <div class="ts-dd">
      <button class="ts-btn" onclick="toggleTradeMenu('sort')">Sort · ${sortLabel[tradeFilter.sort.key]} ${tradeFilter.sort.dir === 'desc' ? '↓' : '↑'} <span class="ts-caret">▾</span></button>
      ${tradeFilter.openMenu === 'sort' ? `<div class="ts-menu">
        ${['date','pnl','symbol'].map(k => `<button class="ts-item ${tradeFilter.sort.key === k ? 'active' : ''}" onclick="setSortKey('${k}')"><span>${sortLabel[k]}</span>${tradeFilter.sort.key === k ? `<span>${tradeFilter.sort.dir === 'desc' ? '↓' : '↑'}</span>` : ''}</button>`).join('')}
      </div>` : ''}
    </div>
  </div>
  ${tradeFilter.openMenu ? `<div class="ts-backdrop" onclick="closeTradeMenus()"></div>` : ''}`;

  if (!trades.length) {
    html += `<div class="empty-state">
      <div class="empty-state-icon">📊</div>
      <div class="empty-state-title">No ${status} trades</div>
      <div class="empty-state-desc">${status === 'open' ? 'Add your first trade to get started.' : 'Closed satellite trades will appear here.'}</div>
      <button class="btn" onclick="switchTab('entry')">+ Add Trade</button>
    </div>`;
  } else {
    html += trades.map(t => renderTradeCard(t)).join('');
  }
  container.innerHTML = html;
}

function toggleTradeMenu(which) { tradeFilter.openMenu = tradeFilter.openMenu === which ? null : which; renderTrades(); }
function closeTradeMenus() { tradeFilter.openMenu = null; renderTrades(); }
function toggleTradeTag(tag) {
  const i = tradeFilter.tags.indexOf(tag);
  if (i >= 0) tradeFilter.tags.splice(i, 1); else tradeFilter.tags.push(tag);
  renderTrades(); // keep the filter menu open for multi-select
}
function clearTradeTags() { tradeFilter.tags = []; renderTrades(); }
function setSortKey(key) {
  if (tradeFilter.sort.key === key) tradeFilter.sort.dir = tradeFilter.sort.dir === 'desc' ? 'asc' : 'desc';
  else { tradeFilter.sort.key = key; tradeFilter.sort.dir = 'desc'; }
  tradeFilter.openMenu = null; // sort is single-pick: close after choosing
  renderTrades();
}

function renderTradeCard(t) {

  return `
    <div class="trade-card animate-fade-up">
      <div class="trade-header">
        <div>
          <div class="trade-symbol-row"><div class="trade-symbol">${escapeHtml(t.symbol)}</div>${tvBtn(t.symbol)}</div>

        </div>
        <div class="trade-badges">
          <span class="badge ${t.status === 'open' ? 'warning' : 'success'}">${t.status === 'open' ? 'OPEN' : 'CLOSED'}</span>
          <span class="badge primary">${t.category}</span>
          ${t.status === 'closed' ? `<span class="badge ${(Number(t.realizedPnl) || 0) >= 0 ? 'success' : 'error'}">${formatPnl(t.realizedPnl)}</span>` : ''}
        </div>
      </div>

      <div class="trade-grid">
        <div class="trade-field"><span class="trade-field-label">Entry Price</span><span class="trade-field-value">${formatINR(t.entryPrice)}</span></div>
        <div class="trade-field"><span class="trade-field-label">Quantity</span><span class="trade-field-value">${escapeHtml(t.entryQty)}</span></div>
        <div class="trade-field"><span class="trade-field-label">Entry Date</span><span class="trade-field-value">${formatDate(t.entryDate, { day:'2-digit', month:'short', year:'2-digit' })}</span></div>
        ${t.status === 'closed' ? `
          <div class="trade-field"><span class="trade-field-label">Exit Price</span><span class="trade-field-value">${formatINR(t.exitPrice)}</span></div>
          <div class="trade-field"><span class="trade-field-label">Exit Qty</span><span class="trade-field-value">${escapeHtml(t.exitQty)}</span></div>
          <div class="trade-field"><span class="trade-field-label">Closed</span><span class="trade-field-value">${formatDate(t.closedAt || t.exitDate, { day:'2-digit', month:'short', year:'2-digit' })}</span></div>
        ` : `
          ${live ? `<div class="trade-field"><span class="trade-field-label">Live Price</span><span class="trade-field-value">${formatINR(live.price)}</span></div>` : ''}
          ${unrealized !== null ? `<div class="trade-field"><span class="trade-field-label">Unrealized P&L</span><span class="trade-field-value ${pnlClass(unrealized)}">${formatPnl(unrealized)}</span></div>` : ''}
        `}
      </div>

      ${(t.tags && t.tags.length) ? `<div class="trade-tags">${t.tags.map(tag => `<span class="tag-chip">${escapeHtml(tag)}<button class="tag-remove" onclick="removeTradeTag('${t.id}','${escapeHtml(tag)}')">×</button></span>`).join('')}</div>` : ''}

      ${t.entryDesc ? `<div class="trade-desc"><strong style="color: var(--text); font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em;">Entry:</strong>\n${escapeHtml(t.entryDesc)}</div>` : ''}
      ${t.exitDesc ? `<div class="trade-desc"><strong style="color: var(--text); font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em;">Exit:</strong>\n${escapeHtml(t.exitDesc)}</div>` : ''}

      ${(t.entryChart || t.exitChart) ? `<div class="trade-charts">
        ${t.entryChart ? `<img class="trade-chart-thumb" src="${t.entryChart}" alt="Entry" onclick="openLightbox('${t.id}','entry')">` : ''}
        ${t.exitChart ? `<img class="trade-chart-thumb" src="${t.exitChart}" alt="Exit" onclick="openLightbox('${t.id}','exit')">` : ''}
      </div>` : ''}

      <div class="trade-actions">
        ${t.status === 'open' ? `<button class="btn btn-success btn-sm" onclick="openCloseTradeModal('${t.id}')">Close Trade</button>` : ''}
        <button class="btn btn-ghost btn-sm" onclick="openEditTradeModal('${t.id}')">Edit</button>
        <button class="btn btn-ghost btn-sm" onclick="addTagPrompt('${t.id}')">+ Tag</button>
        <button class="btn btn-danger btn-sm" onclick="deleteTradePrompt('${t.id}')">Delete</button>
      </div>
    </div>
  `;
}

function renderCorePortfolio() {
  if (!state.portfolio.length) {
    return `<div class="empty-state">
      <div class="empty-state-icon">💼</div>
      <div class="empty-state-title">No core holdings</div>
      <div class="empty-state-desc">Long-term holdings will appear here.</div>
      <button class="btn" onclick="switchTab('entry')">+ Add Core Holding</button>
    </div>`;
  }
  let totalInvested = 0, totalCurrent = 0;
  const rows = state.portfolio.map(p => {
    const live = window.livePrices[p.symbol];
    const invested = Number(p.qty) * Number(p.avgPrice);
    const current = live ? Number(p.qty) * live.price : invested;
    const pnl = current - invested;
    const pnlPct = invested ? (pnl / invested) * 100 : 0;
    totalInvested += invested;
    totalCurrent += current;
    return `
      <div class="trade-card">
        <div class="trade-header">
          <div>
            <div class="trade-symbol-row"><div class="trade-symbol">${escapeHtml(p.symbol)}</div>${tvBtn(p.symbol)}</div>
            <div class="trade-name">${escapeHtml(p.tradeName || '')}</div>
          </div>
          <div class="trade-badges">
            <span class="badge primary">CORE</span>
            <span class="badge ${pnl >= 0 ? 'success' : 'error'}">${formatPnl(pnl)} (${pnlPct.toFixed(2)}%)</span>
          </div>
        </div>
        <div class="trade-grid">
          <div><div class="trade-field-label">Qty</div><div class="trade-field-value">${escapeHtml(p.qty)}</div></div>
          <div><div class="trade-field-label">Avg Buy</div><div class="trade-field-value">${formatINR(p.avgPrice)}</div></div>
          <div><div class="trade-field-label">Live Price</div><div class="trade-field-value">${live ? formatINR(live.price) : '—'}</div></div>
          <div><div class="trade-field-label">Invested</div><div class="trade-field-value">${formatINR(invested)}</div></div>
          <div><div class="trade-field-label">Current</div><div class="trade-field-value">${formatINR(current)}</div></div>
        </div>
        <div class="trade-actions">
          <button class="btn btn-success btn-sm" onclick="openCloseCoreModal('${p.id}')">Sell / Close</button>
          <button class="btn btn-ghost btn-sm" onclick="openEditPortfolioModal('${p.id}')">Edit</button>
          <button class="btn btn-danger btn-sm" onclick="deletePortfolioPrompt('${p.id}')">Delete</button>
        </div>
      </div>
    `;
  }).join('');

  const totalPnl = totalCurrent - totalInvested;
  const totalPct = totalInvested ? (totalPnl / totalInvested) * 100 : 0;

  return `
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-label">Invested</div><div class="stat-value">${formatINR(totalInvested)}</div></div>
      <div class="stat-card"><div class="stat-label">Current Value</div><div class="stat-value">${formatINR(totalCurrent)}</div></div>
      <div class="stat-card"><div class="stat-label">P&L</div><div class="stat-value ${pnlClass(totalPnl)}">${formatPnl(totalPnl)}</div><div class="stat-meta">${totalPct.toFixed(2)}%</div></div>
      <div class="stat-card"><div class="stat-label">Holdings</div><div class="stat-value">${state.portfolio.length}</div></div>
    </div>
    ${rows}
  `;
}

/* ========================================================================
   CORE CLOSED LIST + CLOSE CORE HOLDING

      <div class="empty-state-icon">📦</div>
      <div class="empty-state-title">No closed core holdings</div>

    </div>`;

  return `
    <div class="stat-grid" style="margin-bottom: 12px;">
      <div class="stat-card"><div class="stat-label">Closed Records</div><div class="stat-value">${items.length}</div></div>
      <div class="stat-card"><div class="stat-label">Total Realized P&L</div><div class="stat-value ${pnlClass(totalPnl)}">${formatPnl(totalPnl)}</div></div>
    </div>
    ${items.map(item => `
      <div class="trade-card animate-fade-up">
        <div class="trade-header">
          <div>
            <div class="trade-symbol-row"><div class="trade-symbol">${escapeHtml(item.symbol)}</div>${tvBtn(item.symbol)}</div>
            ${item.tradeName ? `<div class="trade-name">${escapeHtml(item.tradeName)}</div>` : ''}
          </div>
          <div class="trade-badges">
            <span class="badge">CORE</span>
            <span class="badge success">SOLD</span>
            <span class="badge ${(Number(item.realizedPnl)||0) >= 0 ? 'success' : 'error'}">${formatPnl(item.realizedPnl)}</span>
          </div>
        </div>
        <div class="trade-grid">
          <div><div class="trade-field-label">Avg Buy</div><div class="trade-field-value">${formatINR(item.entryPrice)}</div></div>
          <div><div class="trade-field-label">Sell Price</div><div class="trade-field-value">${formatINR(item.exitPrice)}</div></div>
          <div><div class="trade-field-label">Qty Sold</div><div class="trade-field-value">${escapeHtml(item.exitQty)}</div></div>
          <div><div class="trade-field-label">Buy Date</div><div class="trade-field-value">${formatDate(item.entryDate, { day:'2-digit', month:'short', year:'2-digit' })}</div></div>
          <div><div class="trade-field-label">Sell Date</div><div class="trade-field-value">${formatDate(item.closedAt, { day:'2-digit', month:'short', year:'2-digit' })}</div></div>
          <div><div class="trade-field-label">Category</div><div class="trade-field-value">${escapeHtml(item.category || 'Stocks')}</div></div>
        </div>
        ${item.exitDesc ? `<div class="trade-desc"><strong style="color: var(--text); font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em;">Exit Notes:</strong>\n${escapeHtml(item.exitDesc)}</div>` : ''}
        ${item.exitChart ? `<div class="trade-charts"><img class="trade-chart-thumb" src="${item.exitChart}" alt="Exit Chart" onclick="openCoreLightbox('${item.id}')"></div>` : ''}
        <div class="trade-actions">
          <button class="btn btn-danger btn-sm" onclick="deleteCoreClosed('${item.id}')">Delete</button>
        </div>
      </div>
    `).join('')}
  `;
}

function openCloseCoreModal(id) {
  const p = state.portfolio.find(x => x.id === id);
  if (!p) return;
  let exitChartData = null;

  showModal({
    title: `Sell / Close: ${p.symbol}`,
    body: `
      <p style="color: var(--text-muted); font-size: 12px; margin: 0 0 12px;">
        Avg Buy: <strong class="mono">${formatINR(p.avgPrice)}</strong> &nbsp;·&nbsp;
        Holding: <strong class="mono">${escapeHtml(p.qty)}</strong> shares
      </p>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Sell Price ₹ *</label>
          <input class="form-input mono" id="cc-exitPrice" type="number" step="0.01" placeholder="0.00" value="${window.livePrices[p.symbol] ? window.livePrices[p.symbol].price.toFixed(2) : ''}">
        </div>
        <div class="form-group">
          <label class="form-label">Qty to Sell * (max ${escapeHtml(p.qty)})</label>
          <input class="form-input mono" id="cc-sellQty" type="number" step="1" min="1" max="${escapeHtml(p.qty)}" value="${escapeHtml(p.qty)}">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Sell Date &amp; Time</label>
        <input class="form-input mono" id="cc-exitDate" type="datetime-local" value="${nowDatetimeLocal()}">
      </div>
      <div class="form-group">
        <label class="form-label">P&amp;L (auto-calculated, or override)</label>
        <input class="form-input mono" id="cc-pnl" type="number" step="0.01" placeholder="Auto">
      </div>
      <div class="form-group">
        <label class="form-label">Exit Notes</label>
        <textarea class="form-textarea" id="cc-exitNotes" rows="2" placeholder="Reason for selling, observations..."></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">After-close Chart</label>
        <div class="drop-zone" id="ccDropZone">
          <div style="text-align:center; color: var(--text-muted);">
            <div style="font-size: 24px; margin-bottom: 4px;">📷</div>
            <div style="font-size: 13px;">Drop image or click to upload</div>
          </div>
          <input type="file" id="ccChartInput" accept="image/*" style="position:absolute;inset:0;opacity:0;cursor:pointer;">
        </div>
        <div id="ccChartPreview" style="margin-top: 8px;"></div>
      </div>
    `,
    footer: `
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-success" id="confirmCloseCoreBtn">Confirm Sale</button>
    `
  });

  // Auto-calc P&L when price or qty changes
  const calcPnl = () => {
    const ep = parseFloat(document.getElementById('cc-exitPrice').value);
    const sq = parseInt(document.getElementById('cc-sellQty').value);
    const pnlField = document.getElementById('cc-pnl');
    if (!isNaN(ep) && !isNaN(sq) && !pnlField.dataset.manual) {
      pnlField.value = ((ep - Number(p.avgPrice)) * sq).toFixed(2);
    }
  };
  document.getElementById('cc-exitPrice').oninput = calcPnl;
  document.getElementById('cc-sellQty').oninput = () => {
    const sq = parseInt(document.getElementById('cc-sellQty').value);
    if (!isNaN(sq) && sq > Number(p.qty)) document.getElementById('cc-sellQty').value = p.qty;
    calcPnl();
  };
  document.getElementById('cc-pnl').oninput = (e) => {
    e.target.dataset.manual = e.target.value ? '1' : '';
  };

  // Chart upload
  const dropZone = document.getElementById('ccDropZone');
  const chartInput = document.getElementById('ccChartInput');
  const setupChart = async (file) => {
    if (!file || !file.type.startsWith('image/')) return;
    exitChartData = await readFileAsBase64(file);
    document.getElementById('ccChartPreview').innerHTML = `<img src="${exitChartData}" style="width:100%; border-radius:8px; max-height:180px; object-fit:cover;">`;
  };
  chartInput.onchange = (e) => { if (e.target.files[0]) setupChart(e.target.files[0]); };
  dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.style.borderColor = 'var(--primary)'; });
  dropZone.addEventListener('dragleave', () => { dropZone.style.borderColor = ''; });
  dropZone.addEventListener('drop', (e) => { e.preventDefault(); dropZone.style.borderColor = ''; if (e.dataTransfer.files[0]) setupChart(e.dataTransfer.files[0]); });

  document.getElementById('confirmCloseCoreBtn').onclick = async () => {
    const exitPrice = parseFloat(document.getElementById('cc-exitPrice').value);
    const sellQty = parseInt(document.getElementById('cc-sellQty').value);
    if (isNaN(exitPrice) || exitPrice <= 0) return showToast('Enter a valid sell price', 'error');
    if (isNaN(sellQty) || sellQty <= 0 || sellQty > Number(p.qty)) return showToast(`Enter a valid qty (1–${p.qty})`, 'error');
    const exitDate = document.getElementById('cc-exitDate').value;
    const exitNotes = document.getElementById('cc-exitNotes').value.trim();
    let realizedPnl = parseFloat(document.getElementById('cc-pnl').value);
    if (isNaN(realizedPnl)) realizedPnl = (exitPrice - Number(p.avgPrice)) * sellQty;
    const commission = estimateCommission(Number(p.avgPrice) * sellQty + exitPrice * sellQty);

    // Create core-closed record
    const record = {
      id: generateId(),
      portfolioType: 'core',
      symbol: p.symbol,
      category: p.category || 'stocks',
      tradeName: p.tradeName || '',
      entryPrice: p.avgPrice,
      entryDate: p.dateAdded || null,
      exitPrice: exitPrice,
      exitQty: sellQty,
      exitDesc: exitNotes,
      exitChart: exitChartData,
      realizedPnl: realizedPnl,
      commission: commission,
      closedAt: exitDate ? new Date(exitDate).toISOString() : new Date().toISOString(),
      status: 'closed'
    };
    if (!Array.isArray(state.coreClosed)) state.coreClosed = [];
    state.coreClosed.push(record);

    // Update or remove holding
    const remaining = Number(p.qty) - sellQty;
    if (remaining <= 0) {
      state.portfolio = state.portfolio.filter(x => x.id !== id);
      showToast(`${p.symbol} fully sold — ${formatPnl(realizedPnl)}`, realizedPnl >= 0 ? 'success' : 'warning', 4000);
    } else {
      p.qty = remaining;
      showToast(`${p.symbol} partial sell ${sellQty} shares — ${formatPnl(realizedPnl)}`, realizedPnl >= 0 ? 'success' : 'warning', 4000);
    }

    await saveState();
    closeModal();
    setSubTab('trades', 'core');
  };
}

function deleteCoreClosed(id) {
  showModal({
    title: 'Delete Record',
    body: '<p style="color: var(--text-muted);">Delete this closed core holding record? This cannot be undone.</p>',
    footer: `<button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-danger" id="delCoreCBtn">Delete</button>`
  });
  document.getElementById('delCoreCBtn').onclick = async () => {
    state.coreClosed = (state.coreClosed || []).filter(x => x.id !== id);
    await saveState();
    closeModal();
    setSubTab('trades', 'core-closed');
    showToast('Record deleted', 'info');
  };
}

function openCoreLightbox(id) {
  const item = (state.coreClosed || []).find(x => x.id === id);
  if (!item || !item.exitChart) return;
  showModal({
    title: `${item.symbol} — Exit Chart`,
    body: `<img src="${item.exitChart}" style="width:100%; border-radius: 8px; max-height: 70vh; object-fit: contain;">`
  });
}

let entryState = {
  portfolioType: 'satellite',
  category: 'stocks',
  entryChart: null,
  tags: [],
  ruleTags: {}
};
let closeRuleTags = {};

function renderEntry() {
  document.getElementById('panel-entry').innerHTML = `
    <div class="page-header">
      <div>
        <h1 class="page-title">New Trade</h1>
        <p class="page-subtitle">Log a new position or holding</p>
      </div>
    </div>

    <div class="card">

          <button class="toggle-btn ${entryState.portfolioType === 'core' ? 'active' : ''}" data-val="core">Core (Long-term)</button>

      </div>

        <div class="form-group">
          <label class="form-label">Symbol *</label>
          <input class="form-input mono" id="ef-symbol" placeholder="e.g. RELIANCE" style="text-transform: uppercase;">
        </div>
        <div class="form-group">
          <label class="form-label">Trade Name / Setup</label>
          <input class="form-input" id="ef-name" placeholder="e.g. Breakout buy">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Entry Price ₹ *</label>
          <input class="form-input mono" id="ef-price" type="number" step="0.01" placeholder="0.00">
        </div>
        <div class="form-group">
          <label class="form-label">Quantity *</label>
          <input class="form-input mono" id="ef-qty" type="number" step="1" placeholder="0">
        </div>
        <div class="form-group">
          <label class="form-label">Entry Date & Time</label>
          <input class="form-input mono" id="ef-date" type="datetime-local" value="${nowDatetimeLocal()}">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Trade Logic / Notes</label>
        <textarea class="form-textarea" id="ef-desc" rows="3" placeholder="Why you're taking this trade, key levels, plan..."></textarea>
      </div>

      <div class="form-group">
        <label class="form-label">Before Chart</label>
        <div class="drop-zone" id="dropZoneEntry">
          ${entryState.entryChart ? `<img class="drop-zone-preview" src="${entryState.entryChart}">` : `
            <div>
              <div style="font-size: 28px; opacity: 0.4;">📈</div>
              <div style="margin-top: 6px; font-size: 13px;">Click or drag image to upload</div>
              <div style="font-size: 11px; opacity: 0.6;">PNG, JPG (stored as base64 in backup)</div>
            </div>`}
          <input type="file" id="dropInputEntry" accept="image/*" style="display: none;">

      ${state.rules.length > 0 ? `
      <div class="form-group">
        <label class="form-label">Rules <span style="color: var(--text-subtle); text-transform: none; letter-spacing: 0; font-weight: 400;">— Plan: which rules will you follow?</span></label>

function removeEntryTag(tag) {
  entryState.tags = entryState.tags.filter(t => t !== tag);
  renderEntry();
}

function resetEntry() {
  entryState = { portfolioType: 'satellite', category: 'stocks', entryChart: null, tags: [], ruleTags: {} };
  renderEntry();
}

async function submitEntry() {
  const symbol = (document.getElementById('ef-symbol').value || '').trim().toUpperCase();
  const tradeName = (document.getElementById('ef-name').value || '').trim();
  const entryPrice = parseFloat(document.getElementById('ef-price').value);
  const entryQty = parseFloat(document.getElementById('ef-qty').value);
  const entryDate = document.getElementById('ef-date').value || new Date().toISOString();
  const entryDesc = (document.getElementById('ef-desc').value || '').trim();

  if (!symbol) return showToast('Symbol is required', 'error');
  if (isNaN(entryPrice) || entryPrice <= 0) return showToast('Valid entry price required', 'error');
  if (isNaN(entryQty) || entryQty <= 0) return showToast('Valid quantity required', 'error');

  if (entryState.portfolioType === 'core') {
    state.portfolio.push({
      id: generateId(),
      symbol, tradeName,
      qty: entryQty,
      avgPrice: entryPrice,
      addedAt: new Date().toISOString()
    });
    await saveState();
    showToast(`${symbol} added to Core portfolio`, 'success');
  } else {
    state.trades.push({
      id: generateId(),
      portfolioType: 'satellite',
      status: 'open',
      category: entryState.category,
      symbol, tradeName,
      entryPrice, entryQty,
      entryDate: new Date(entryDate).toISOString(),
      entryDesc,
      entryChart: entryState.entryChart,
      tags: [...entryState.tags],
      ruleTagsEntry: { ...entryState.ruleTags },
      createdAt: new Date().toISOString()
    });
    await saveState();
    showToast(`${symbol} trade added`, 'success');
  }
  resetEntry();
  switchTab('trades');
}

function setupDropZone(zoneId, inputId, callback) {
  const zone = document.getElementById(zoneId);
  const input = document.getElementById(inputId);
  if (!zone || !input) return;
  zone.onclick = () => input.click();
  zone.ondragover = (e) => { e.preventDefault(); zone.classList.add('dragover'); };
  zone.ondragleave = () => zone.classList.remove('dragover');
  zone.ondrop = async (e) => {
    e.preventDefault();
    zone.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) {
      const b64 = await readFileAsBase64(file);
      callback(b64);
    }
  };
  input.onchange = async (e) => {
    const file = e.target.files[0];
    if (file && file.type.startsWith('image/')) {
      const b64 = await readFileAsBase64(file);
      callback(b64);
    }
  };
}

          </div>
          <input type="file" id="dropInputClose" accept="image/*" style="display: none;">
        </div>
      </div>
      ${state.rules.length > 0 ? `
      <div class="form-group">
        <label class="form-label">Rules <span style="color: var(--text-subtle); text-transform: none; letter-spacing: 0; font-weight: 400;">— Did you follow these rules?</span></label>
        <div class="rules-checklist" id="closeRulesChecklist">
          ${state.rules.map(r => {
            const cur = (t.ruleTagsEntry || {})[r.id];
            return `<div class="rule-check-row" data-rule="${r.id}">
              <span class="rule-check-name">${escapeHtml(r.name)}</span>
              <div class="rule-choice-btns">
                <button class="rule-choice-btn ${cur === 'followed' ? 'active-followed' : ''}" data-choice="followed" onclick="toggleCloseRuleTag('${r.id}','followed')">✓ Yes</button>
                <button class="rule-choice-btn ${cur === 'notfollowed' ? 'active-not' : ''}" data-choice="notfollowed" onclick="toggleCloseRuleTag('${r.id}','notfollowed')">✗ No</button>
              </div>
            </div>`;
          }).join('')}
        </div>
      </div>` : ''}
    `,
    footer: `
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-success" id="confirmCloseBtn">Close Trade</button>
    `
  });
  let exitChart = null;
  setupDropZone('dropZoneClose', 'dropInputClose', (b64) => {
    exitChart = b64;
    const z = document.getElementById('dropZoneClose');
    z.innerHTML = `<img class="drop-zone-preview" src="${b64}"><input type="file" id="dropInputClose" accept="image/*" style="display: none;">`;
    setupDropZone('dropZoneClose', 'dropInputClose', (b) => { exitChart = b; });
  });
  document.getElementById('confirmCloseBtn').onclick = async () => {
    const exitPrice = parseFloat(document.getElementById('cf-price').value);
    const exitQty = parseFloat(document.getElementById('cf-qty').value) || Number(t.entryQty);
    const exitDate = document.getElementById('cf-date').value;
    let realizedPnl = parseFloat(document.getElementById('cf-pnl').value);
    if (isNaN(realizedPnl)) {
      realizedPnl = (exitPrice - Number(t.entryPrice)) * exitQty;
    }
    if (isNaN(exitPrice) || exitPrice <= 0) return showToast('Valid exit price required', 'error');
    let commission = parseFloat(document.getElementById('cf-comm').value);
    if (isNaN(commission)) {
      commission = estimateCommission(Number(t.entryPrice) * exitQty + exitPrice * exitQty);
    }
    t.status = 'closed';
    t.exitPrice = exitPrice;
    t.exitQty = exitQty;
    t.exitDate = exitDate ? new Date(exitDate).toISOString() : new Date().toISOString();
    t.exitDesc = (document.getElementById('cf-desc').value || '').trim();
    t.exitChart = exitChart;
    t.realizedPnl = realizedPnl;
    t.commission = commission;
    t.ruleTagsExit = { ...closeRuleTags };
    t.closedAt = new Date().toISOString();
    await saveState();
    closeModal();
    const net = realizedPnl - commission;
    showToast(`Trade closed: ${formatPnl(net)} net`, net >= 0 ? 'success' : 'warning');
    renderActivePanel();
  };
}

        </div>`;

      document.getElementById(`et-${which}-replace`).onclick = () => document.getElementById(`et-${which}-input`).click();
      document.getElementById(`et-${which}-delete`).onclick = () => {
        if (which === 'entry') newEntryChart = null; else newExitChart = null;
        renderEditChart(which);
      };
    } else {
      container.innerHTML = `
        <div class="drop-zone" id="et-${which}-zone">
          <div><div style="font-size:24px; opacity:0.4;">📊</div><div style="margin-top:4px; font-size:13px; color:var(--text-muted);">Click or drag to add chart image</div></div>

        e.preventDefault(); zone.classList.remove('dragover');

        if (file && file.type.startsWith('image/')) {
          const b64 = await readFileAsBase64(file);
          if (which === 'entry') newEntryChart = b64; else newExitChart = b64;
          renderEditChart(which);
        }
      };
    }
    const input = document.getElementById(`et-${which}-input`);
    if (input) {
      input.onchange = async (e) => {
        const file = e.target.files[0];
        if (file && file.type.startsWith('image/')) {

          if (which === 'entry') newEntryChart = b64; else newExitChart = b64;
          renderEditChart(which);
          e.target.value = '';
        }
      };
    }
  }

  renderEditChart('entry');
  if (t.status === 'closed') renderEditChart('exit');

  document.getElementById('saveEditBtn').onclick = async () => {
    t.symbol = (document.getElementById('et-symbol').value || '').toUpperCase().trim();
    t.tradeName = document.getElementById('et-name').value.trim();
    t.entryPrice = parseFloat(document.getElementById('et-price').value);

      t.exitDesc = document.getElementById('et-exit-desc').value;
      t.exitChart = newExitChart;
    }
    t.entryChart = newEntryChart;
    await saveState();
    closeModal();
    showToast('Trade updated', 'success');
    renderActivePanel();
  };
}

/* Pointer-based drag reorder (works on touch + mouse). The dragged card is
   reordered live in the DOM as the pointer moves; the new order is committed
   to state on release. */
function initWatchlistDrag() {
  const container = document.getElementById('wlCards');
  if (!container) return;
  container.querySelectorAll('.wl-drag-handle').forEach(handle => {
    handle.addEventListener('pointerdown', e => {
      e.preventDefault();
      const dragEl = handle.closest('.trade-card');
      if (!dragEl) return;
      dragEl.classList.add('wl-dragging');
      try { handle.setPointerCapture(e.pointerId); } catch (_) {}
      const onMove = ev => {
        const cards = [...container.querySelectorAll('.trade-card:not(.wl-dragging)')];
        let placed = false;
        for (const c of cards) {
          const r = c.getBoundingClientRect();
          if (ev.clientY < r.top + r.height / 2) { container.insertBefore(dragEl, c); placed = true; break; }
        }
        if (!placed) container.appendChild(dragEl);
      };
      const onUp = () => {
        document.removeEventListener('pointermove', onMove);
        document.removeEventListener('pointerup', onUp);
        document.removeEventListener('pointercancel', onUp);
        dragEl.classList.remove('wl-dragging');
        commitWatchlistOrder();
      };
      document.addEventListener('pointermove', onMove);
      document.addEventListener('pointerup', onUp);
      document.addEventListener('pointercancel', onUp);
    });
  });
}
async function commitWatchlistOrder() {
  const container = document.getElementById('wlCards');
  const active = state.watchlists.find(w => w.id === activeSubTab.wl);
  if (!container || !active) return;
  const order = [...container.querySelectorAll('.trade-card')].map(c => c.dataset.symbol);
  active.symbols.sort((a, b) => order.indexOf(a.symbol) - order.indexOf(b.symbol));
  await saveState();
  renderActivePanel();
}

/* ========================================================================
   TRADINGVIEW IMPORT — link (public lists) or exported .txt / pasted text
   ======================================================================== */
function tvSym(tok) {
  let s = String(tok || '').trim();
  const m = s.match(/^([A-Za-z.]+):(.+)$/); // strip EXCHANGE: prefix
  if (m) s = m[2];
  s = s.toUpperCase().replace(/[^A-Z0-9&._-]/g, '');
  if (!s || s.length > 20 || !/^[A-Z]/.test(s)) return '';
  if (/^(HTTP|HTTPS|WWW|COM|JSON|HTML|SVG|PNG|JPG|CSS|API|GET|POST|UTF|DIV|SPAN)$/.test(s)) return '';
  return s;
}
function tvParse(text) {
  if (!text) return [];
  // Whatever the source — an exported .txt (###Section,EXCHANGE:SYMBOL,…), a
  // proxied JSON payload ("###Section","EXCHANGE:SYMBOL",…) or rendered link
  // text — TradingView writes each category as a "###Name" row ahead of its
  // symbols. Decode the usual JSON escapes, then scan IN ORDER for either a
  // section header or an EXCHANGE:SYMBOL token, so the category labels survive
  // (the old link path discarded them and dumped everything into one group).
  const s = String(text).replace(/\\u0023/gi, '#').replace(/\\u003a/gi, ':');
  const groups = [];
  let cur = null;
  const ensure = (name) => {
    const nm = (name || 'Imported').trim().slice(0, 40) || 'Imported';
    cur = { section: nm, symbols: [] };
    groups.push(cur);
  };
  const add = (raw) => {
    const sym = tvSym(raw);
    if (!sym) return;
    if (!cur) ensure('Imported');
    if (!cur.symbols.includes(sym)) cur.symbols.push(sym);
  };
  const re = /###\s*([^,"'\n\r\[\]{}]+)|\b([A-Z]{2,12}):([A-Z0-9][A-Z0-9&._!-]{0,19})/g;
  let m, guard = 0;
  while ((m = re.exec(s)) && guard++ < 5000) {
    if (m[1] != null) ensure(m[1]);          // category header → start a new group
    else add(m[2] + ':' + m[3]);             // EXCHANGE:SYMBOL → into current group
  }
  // Fallback: a bare list with no exchange prefixes and no section headers.
  if (!groups.some(g => g.symbols.length)) {
    groups.length = 0; cur = null;
    ensure('Imported');
    s.split(/[\s,]+/).map(t => t.trim()).filter(Boolean).forEach(add);
  }
  return groups.filter(g => g.symbols.length);
}
async function tvFetchLink(url) {
  if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
  const proxies = [
    u => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(u),
    u => 'https://corsproxy.io/?url=' + encodeURIComponent(u),
    u => 'https://r.jina.ai/' + u
  ];
  for (const p of proxies) {
    try {
      const res = await fetch(p(url));
      if (res.ok) { const t = await res.text(); if (t && t.length > 80) return t; }
    } catch (e) {}
  }
  throw new Error('fetch failed');
}
function tvProceed(text) {
  const groups = tvParse(text);
  const msg = document.getElementById('tv-msg');
  if (!groups.length) { if (msg) msg.textContent = 'No symbols found. For private lists, use TradingView → Export watchlist and paste the text.'; return; }
  tvShowConfirm(groups);
}

async function tvDoImport() {
  const groups = window.__tvImport || [];
  let added = 0, skipped = 0, usedWatchlist = false, usedPriority = false;
  groups.forEach((g, gi) => {
    const sel = document.getElementById('tv-dest-' + gi);
    if (!sel) return;
    const dest = sel.value;
    if (dest === 'skip') return;
    const syms = [...document.querySelectorAll('.tv-sym[data-g="' + gi + '"]')].filter(c => c.checked).map(c => c.getAttribute('data-s'));
    if (!syms.length) return;
    if (dest === 'priority') {
      usedPriority = true;
      syms.forEach(sym => {
        if (state.priority.find(p => p.symbol === sym)) { skipped++; return; }
        state.priority.push({ id: generateId(), symbol: sym, category: 'stocks', setup: '', trigger: null, target: null, sl: null, notes: 'Imported from TradingView', chart: '', createdAt: new Date().toISOString() });
        added++;
      });
    } else {
      usedWatchlist = true;
      let wl;
      if (dest === 'new') { wl = { id: generateId(), name: g.section, symbols: [] }; state.watchlists.push(wl); }
      else { wl = state.watchlists.find(w => w.id === dest.slice(3)); }
      if (!wl) return;
      syms.forEach(sym => {
        if (wl.symbols.find(s => s.symbol === sym)) { skipped++; return; }
        wl.symbols.push({ symbol: sym, notes: '', gtt: null, addedAt: new Date().toISOString() });
        added++;
      });
    }
  });
  await saveState();
  closeModal();
  showToast(`Imported ${added} symbol${added === 1 ? '' : 's'}${skipped ? ` · ${skipped} already there` : ''}`, added ? 'success' : 'info');

  else if (usedPriority) switchTab('priority');
  else renderActivePanel();
}

/* ========================================================================
   CALENDAR
   ======================================================================== */
function renderCalendar() {
  const year = calendarMonth.getFullYear();
  const month = calendarMonth.getMonth();
  const monthName = calendarMonth.toLocaleString('en-IN', { month: 'long', year: 'numeric' });
  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0);
  const startDow = (firstDay.getDay() + 6) % 7; // Mon=0
  const daysInMonth = lastDay.getDate();
  const today = new Date();

  // Build day-keyed P&L map for this month (satellite closed + core closed)
  const dayMap = {};
  const allClosed = [
    ...state.trades.filter(t => t.status === 'closed' && t.closedAt),
    ...(state.coreClosed || []).filter(t => t.closedAt)
  ];
  allClosed.forEach(t => {
    const d = new Date(t.closedAt);
    if (d.getFullYear() === year && d.getMonth() === month) {
      const pnl = Number(t.realizedPnl) || 0;
      if (calendarFilter === 'profit' && pnl <= 0) return;
      if (calendarFilter === 'loss' && pnl >= 0) return;
      const key = d.getDate();
      if (!dayMap[key]) dayMap[key] = { pnl: 0, count: 0 };
      dayMap[key].pnl += pnl;
      dayMap[key].count++;
    }
  });

  // Month totals
  const monthlyTotal = Object.values(dayMap).reduce((s, x) => s + x.pnl, 0);
  const monthlyCount = Object.values(dayMap).reduce((s, x) => s + x.count, 0);

  let grid = '';
  ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].forEach(d => grid += `<div class="calendar-day-header">${d}</div>`);
  for (let i = 0; i < startDow; i++) grid += `<div class="calendar-day empty"></div>`;
  for (let d = 1; d <= daysInMonth; d++) {
    const info = dayMap[d];
    const isToday = today.getFullYear() === year && today.getMonth() === month && today.getDate() === d;
    let bg = '';
    if (info) {
      const intensity = Math.min(Math.abs(info.pnl) / 5000, 1);
      bg = info.pnl > 0
        ? `background: rgba(34, 197, 94, ${0.1 + intensity * 0.4})`
        : info.pnl < 0
          ? `background: rgba(239, 68, 68, ${0.1 + intensity * 0.4})`
          : '';
    }
    grid += `
      <div class="calendar-day ${isToday ? 'today' : ''}" style="${bg}">
        <div class="calendar-day-num">${d}</div>
        ${info ? `
          <div>
            <div class="calendar-day-pnl ${pnlClass(info.pnl)}">${info.pnl > 0 ? '+' : ''}${Math.round(info.pnl).toLocaleString('en-IN')}</div>
            <div class="calendar-day-count">${info.count} trade${info.count === 1 ? '' : 's'}</div>
          </div>
        ` : ''}
      </div>
    `;
  }

  document.getElementById('panel-calendar').innerHTML = `
    <div class="page-header">
      <div>
        <h1 class="page-title">Calendar</h1>
        <p class="page-subtitle">P&L heatmap by day</p>
      </div>
    </div>
    <div class="calendar-wrap">
      <div class="calendar-header">
        <div style="display: flex; align-items: center; gap: 8px;">
          <button class="btn btn-ghost btn-sm" onclick="shiftCalendar(-1)">‹</button>
          <div style="font-weight: 600; min-width: 140px; text-align: center;">${monthName}</div>
          <button class="btn btn-ghost btn-sm" onclick="shiftCalendar(1)">›</button>
          <button class="btn btn-ghost btn-sm" onclick="calendarToday()">Today</button>
        </div>
        <div class="btn-row">
          <button class="tag-filter ${calendarFilter === 'all' ? 'active' : ''}" onclick="setCalendarFilter('all')">All</button>
          <button class="tag-filter ${calendarFilter === 'profit' ? 'active' : ''}" onclick="setCalendarFilter('profit')">Profit</button>
          <button class="tag-filter ${calendarFilter === 'loss' ? 'active' : ''}" onclick="setCalendarFilter('loss')">Loss</button>
        </div>
      </div>
      <div class="calendar-grid">${grid}</div>
      <div style="display: flex; gap: 20px; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border-subtle); font-size: 12px;">
        <div><span style="color: var(--text-muted);">Total this month:</span> <span class="mono ${pnlClass(monthlyTotal)}" style="font-weight: 600;">${formatPnl(monthlyTotal)}</span></div>
        <div><span style="color: var(--text-muted);">Trades:</span> <span class="mono" style="font-weight: 600;">${monthlyCount}</span></div>
      </div>
    </div>
  `;
}

function shiftCalendar(delta) {
  calendarMonth = new Date(calendarMonth.getFullYear(), calendarMonth.getMonth() + delta, 1);
  renderCalendar();
}
function calendarToday() { calendarMonth = new Date(); renderCalendar(); }
function setCalendarFilter(f) { calendarFilter = f; renderCalendar(); }

function renderMonthlyRows() {
  const now = new Date();
  const rows = [];
  const allClosedRecords = [
    ...state.trades.filter(t => t.status === 'closed' && t.closedAt),
    ...(state.coreClosed || []).filter(t => t.closedAt)
  ];
  for (let i = 0; i < 12; i++) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const year = d.getFullYear(), month = d.getMonth();
    const trades = allClosedRecords.filter(t => {
      const cd = new Date(t.closedAt);
      return cd.getFullYear() === year && cd.getMonth() === month;
    });
    const total = trades.reduce((s, t) => s + netPnl(t), 0);
    const wins = trades.filter(t => netPnl(t) > 0).length;
    const losses = trades.filter(t => netPnl(t) < 0).length;
    const wr = trades.length ? (wins / trades.length * 100).toFixed(0) + '%' : '—';
    rows.push(`<tr>
      <td>${d.toLocaleString('en-IN', { month: 'short', year: 'numeric' })}</td>
      <td>${trades.length}</td>
      <td><span class="pnl-positive">${wins}W</span> / <span class="pnl-negative">${losses}L</span></td>
      <td>${wr}</td>
      <td class="${pnlClass(total)}">${formatPnl(total)}</td>
    </tr>`);
  }
  return rows.join('');
}

function drawEquityCurve() {
  const canvas = document.getElementById('equityCanvas');
  if (!canvas) return;
  const closed = [
    ...state.trades.filter(t => t.status === 'closed' && t.closedAt),
    ...(state.coreClosed || []).filter(t => t.closedAt)
  ].sort((a, b) => new Date(a.closedAt) - new Date(b.closedAt));
  if (!closed.length) {
    const ctx = canvas.getContext('2d');
    canvas.width = canvas.offsetWidth * (window.devicePixelRatio || 1);
    canvas.height = 280 * (window.devicePixelRatio || 1);
    ctx.scale(window.devicePixelRatio || 1, window.devicePixelRatio || 1);
    ctx.fillStyle = '#64748b';
    ctx.font = '13px Inter, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('No closed trades yet', canvas.offsetWidth / 2, 140);
    return;
  }

  let cumulative = 0;
  const points = closed.map(t => {
    cumulative += netPnl(t);
    return { date: new Date(t.closedAt), pnl: cumulative };
  });
  points.unshift({ date: new Date(points[0].date.getTime() - 86400000), pnl: 0 });

  const dpr = window.devicePixelRatio || 1;
  const w = canvas.offsetWidth;
  const h = 280;
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const padL = 70, padR = 14, padT = 14, padB = 30;
  const plotW = w - padL - padR;
  const plotH = h - padT - padB;

  const min = Math.min(0, ...points.map(p => p.pnl));
  const max = Math.max(0, ...points.map(p => p.pnl));
  const range = max - min || 1;

  const xScale = (i) => padL + (i / (points.length - 1)) * plotW;
  const yScale = (v) => padT + plotH - ((v - min) / range) * plotH;

  // Grid lines
  ctx.strokeStyle = '#1e293b';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 5; i++) {
    const y = padT + (plotH / 5) * i;
    ctx.beginPath();
    ctx.moveTo(padL, y);
    ctx.lineTo(w - padR, y);
    ctx.stroke();
    const val = max - (range / 5) * i;
    ctx.fillStyle = '#64748b';
    ctx.font = '11px JetBrains Mono, monospace';
    ctx.textAlign = 'right';
    ctx.fillText('₹' + Math.round(val).toLocaleString('en-IN'), padL - 8, y + 4);
  }

  // Zero line
  if (min < 0 && max > 0) {
    const zeroY = yScale(0);
    ctx.strokeStyle = '#94a3b8';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(padL, zeroY);
    ctx.lineTo(w - padR, zeroY);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // Line
  const ending = points[points.length - 1].pnl;
  const color = ending >= 0 ? '#22c55e' : '#ef4444';
  const colorRgb = ending >= 0 ? '34, 197, 94' : '239, 68, 68';

  // Gradient fill
  const grad = ctx.createLinearGradient(0, padT, 0, padT + plotH);
  grad.addColorStop(0, `rgba(${colorRgb}, 0.3)`);
  grad.addColorStop(1, `rgba(${colorRgb}, 0)`);
  ctx.beginPath();
  ctx.moveTo(xScale(0), yScale(points[0].pnl));
  for (let i = 1; i < points.length; i++) {
    ctx.lineTo(xScale(i), yScale(points[i].pnl));
  }
  ctx.lineTo(xScale(points.length - 1), padT + plotH);
  ctx.lineTo(xScale(0), padT + plotH);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  // Line on top
  ctx.beginPath();
  ctx.moveTo(xScale(0), yScale(points[0].pnl));
  for (let i = 1; i < points.length; i++) {
    ctx.lineTo(xScale(i), yScale(points[i].pnl));
  }
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.stroke();

  // End point dot
  ctx.beginPath();
  ctx.arc(xScale(points.length - 1), yScale(points[points.length - 1].pnl), 4, 0, Math.PI * 2);
  ctx.fillStyle = color;
  ctx.fill();
  ctx.strokeStyle = '#0f172a';
  ctx.lineWidth = 2;
  ctx.stroke();

  // X-axis labels
  ctx.fillStyle = '#64748b';
  ctx.font = '10px Inter, sans-serif';
  ctx.textAlign = 'center';
  const labelCount = Math.min(6, points.length);
  for (let i = 0; i < labelCount; i++) {
    const idx = Math.floor((i / (labelCount - 1)) * (points.length - 1));
    const d = points[idx].date;
    ctx.fillText(d.toLocaleString('en-IN', { day: '2-digit', month: 'short' }), xScale(idx), h - 10);
  }
}

async function aiSendChat() {

  if (!aiHasKey()) { showToast('Add an API key in Settings first', 'error'); return; }
  const image = aiAttachImage;
  if (input) input.value = '';
  aiChatMessages.push({ role: 'user', text: text || '(image)', image });
  aiAttachImage = null;
  // Remove image preview without full re-render
  const preview = document.querySelector('.ai-attach-preview');

  if (aiChatMessages.filter(m => m.role === 'user').length === 1) {

  aiAppendBubble('user', text || '(image)', image);

function aiBuildJournalSummary() {
  const closed = [
    ...state.trades.filter(t => t.status === 'closed'),
    ...(state.coreClosed || [])
  ];
  if (closed.length === 0) return null;
  const lines = closed.slice(-60).map(t => {
    const ruleStr = t.ruleTagsExit ? Object.entries(t.ruleTagsExit).map(([rid, v]) => {
      const r = (state.rules || []).find(x => x.id === rid); return r ? `${r.name}:${v === 'followed' ? 'Y' : 'N'}` : '';
    }).filter(Boolean).join(', ') : '';
    return `${t.symbol} | ${t.category || 'stocks'} | ${(t.tradeName||'').slice(0,30)} | net ₹${Math.round(netPnl(t))} | tags:${(t.tags||[]).join('/')} | rules:${ruleStr}`;
  }).join('\n');
  const s = computeStats();
  return `Total closed: ${closed.length}. Win rate: ${s.winRate.toFixed(0)}%. Total net P&L: ₹${Math.round(s.totalRealized)}.\nRecent trades (symbol | category | setup | net | tags | rules followed):\n${lines}`;
}

/* ----- Provider API layer ----- */
async function callAI(systemPrompt, messages) {
  const ai = state.settings.ai;
  const provider = ai.provider;
  const key = ai.keys[provider];
  const model = ai.models[provider];
  if (!key) throw new Error('No API key set. Add one in Settings → AI Assistant.');
  if (provider === 'gemini') return callGemini(systemPrompt, messages, key, model);
  return callOpenRouter(systemPrompt, messages, key, model);
}
function aiStripDataUrl(dataUrl) {
  const i = dataUrl.indexOf(',');
  return { mime: (dataUrl.slice(5, dataUrl.indexOf(';')) || 'image/jpeg'), data: dataUrl.slice(i + 1) };
}
async function callGemini(systemPrompt, messages, key, model) {
  const contents = messages.map(m => {
    const parts = [];
    if (m.text) parts.push({ text: m.text });
    if (m.image) { const { mime, data } = aiStripDataUrl(m.image); parts.push({ inline_data: { mime_type: mime, data } }); }
    return { role: m.role === 'assistant' ? 'model' : 'user', parts };
  });
  const body = { contents, systemInstruction: { parts: [{ text: systemPrompt }] }, generationConfig: { temperature: 0.6 } };
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${encodeURIComponent(model)}:generateContent?key=${encodeURIComponent(key)}`;
  const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
  if (!res.ok) {
    let msg = `Gemini error ${res.status}`;
    try { const e = await res.json(); if (e.error && e.error.message) msg = e.error.message; } catch (_) {}
    throw new Error(msg);
  }
  const data = await res.json();
  const cand = data.candidates && data.candidates[0];
  const text = cand && cand.content && cand.content.parts ? cand.content.parts.map(p => p.text || '').join('') : '';
  if (!text) throw new Error('Empty response from Gemini (check model name or safety blocks).');
  return text;
}
async function callOpenRouter(systemPrompt, messages, key, model) {
  const msgs = [{ role: 'system', content: systemPrompt }];
  messages.forEach(m => {
    if (m.image) {
      msgs.push({ role: m.role === 'assistant' ? 'assistant' : 'user', content: [
        ...(m.text ? [{ type: 'text', text: m.text }] : []),
        { type: 'image_url', image_url: { url: m.image } }
      ] });
    } else {
      msgs.push({ role: m.role === 'assistant' ? 'assistant' : 'user', content: m.text });
    }
  });
  const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}`, 'X-Title': 'NazTrades' },
    body: JSON.stringify({ model, messages: msgs, temperature: 0.6 })
  });
  if (!res.ok) {
    let msg = `OpenRouter error ${res.status}`;
    try { const e = await res.json(); if (e.error && e.error.message) msg = e.error.message; } catch (_) {}
    throw new Error(msg);
  }
  const data = await res.json();
  const text = data.choices && data.choices[0] && data.choices[0].message ? data.choices[0].message.content : '';
  if (!text) throw new Error('Empty response from OpenRouter (model may not support this input).');
  return text;
}

function applyTheme(theme) {
  const isDark = (theme || state.settings.theme || 'dark') === 'dark';
  document.documentElement.classList.toggle('light', !isDark);
  // Swap sun/moon icons
  const sun = document.getElementById('iconSun');
  const moon = document.getElementById('iconMoon');
  if (sun) sun.style.display = isDark ? 'block' : 'none';
  if (moon) moon.style.display = isDark ? 'none' : 'block';
  // Update meta theme-color
  const meta = document.querySelector('meta[name="theme-color"]');
  if (meta) meta.setAttribute('content', isDark ? '#0f172a' : '#f1f5f9');
}

function toggleTheme() {
  const cur = state.settings.theme || 'dark';
  const next = cur === 'dark' ? 'light' : 'dark';
  state.settings.theme = next;
  applyTheme(next);
  saveState();
}

function setTheme(t) {
  state.settings.theme = t;
  applyTheme(t);
  saveState();
  renderSettings();
}

function applyFonts() {
  const s = state.settings;
  const textFont = s.textFont || 'Inter';
  const textSize = s.textSize || 14;
  const numFont = s.numFont || 'JetBrains Mono';
  const numSize = s.numSize || 13;
  document.documentElement.style.setProperty('--font-sans', `'${textFont}', ui-sans-serif, system-ui, sans-serif`);
  document.documentElement.style.setProperty('--font-mono', `'${numFont}', ui-monospace, Menlo, Consolas, monospace`);
  document.body.style.fontSize = textSize + 'px';
}

function setTextFont(f) {
  state.settings.textFont = f;

  const preview = document.getElementById('textFontPreview');

}

function downloadJsonBackup() {
  const payload = {
    _version: 2,
    _exportedAt: new Date().toISOString(),
    _app: 'Naz Trades',
    ...state
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  downloadBlob(blob, `naz_trades_backup_${todayDateStr()}.json`);
  showToast('Backup downloaded', 'success');
}

async function restoreJsonFile(event) {
  const file = event.target.files[0];
  event.target.value = '';
  if (!file) return;
  try {
    const text = await file.text();
    const data = JSON.parse(text);
    const isMyTradesFormat = data && data.trades && !Array.isArray(data.trades) && (data.trades.live || data.trades.closed);
    if (!data || (!Array.isArray(data.trades) && !isMyTradesFormat)) {
      return showToast('Invalid backup file — expected Naz Trades or MyTrades JSON', 'error');
    }
    const isMyTrades = isMyTradesFormat;
    let tradeCount = 0;
    if (Array.isArray(data.trades)) {
      tradeCount = data.trades.length;
    } else if (isMyTrades) {
      const t = data.trades;
      ['stocks','futures','options'].forEach(c => {
        tradeCount += ((t.live||{})[c]||[]).length + ((t.closed||{})[c]||[]).length;
      });
    }
    const counts = {
      trades: tradeCount,
      portfolio: Array.isArray(data.portfolio) ? data.portfolio.length : 0,
      priority: Array.isArray(data.priority) ? data.priority.length : 0,
      watchlists: Array.isArray(data.watchlists) ? data.watchlists.length : 0,
      strategies: Array.isArray(data.strategies) ? data.strategies.length : 0,
    };
    showModal({
      title: 'Restore Backup',
      body: `
        <p style="color: var(--text-muted); font-size: 13px; margin: 0 0 12px;">
          This will <strong>replace all your current data</strong> with the contents of this backup. This action cannot be undone.
        </p>
        <div class="confirm-grid">
          <div class="confirm-grid-item"><div class="lbl">Trades</div><div class="val">${counts.trades}</div></div>
          <div class="confirm-grid-item"><div class="lbl">Holdings</div><div class="val">${counts.portfolio}</div></div>
          <div class="confirm-grid-item"><div class="lbl">Priority</div><div class="val">${counts.priority}</div></div>
          <div class="confirm-grid-item"><div class="lbl">Watchlists</div><div class="val">${counts.watchlists}</div></div>
          <div class="confirm-grid-item"><div class="lbl">Strategy notes</div><div class="val">${counts.strategies}</div></div>
          <div class="confirm-grid-item"><div class="lbl">Exported</div><div class="val" style="font-size: 11px;">${data._exportedAt ? new Date(data._exportedAt).toLocaleString('en-IN') : 'Unknown'}</div></div>
        </div>
      `,
      footer: `<button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-danger" id="confirmRestoreBtn">Yes, Restore</button>`
    });
    document.getElementById('confirmRestoreBtn').onclick = async () => {
      state = normalizeState(data);
      await saveState();
      closeModal();
      showToast('Backup restored', 'success');
      renderActivePanel();
    };
  } catch (e) {
    showToast('Failed to parse backup: ' + e.message, 'error');
  }
}

function exportXlsx() {
  if (typeof XLSX === 'undefined') return showToast('XLSX library not loaded', 'error');
  const wb = XLSX.utils.book_new();

  // Sheet 1: Trades
  const tradeRows = state.trades.map((t, i) => ({
    '#': i + 1,
    'Symbol': t.symbol,
    'Category': t.category,
    'Status': t.status,
    'Portfolio': t.portfolioType,
    'Trade Name': t.tradeName || '',
    'Entry Price ₹': t.entryPrice,
    'Entry Qty': t.entryQty,
    'Entry Date': t.entryDate ? new Date(t.entryDate).toLocaleString('en-IN') : '',
    'Entry Notes': t.entryDesc || '',
    'Exit Price ₹': t.exitPrice ?? '',
    'Exit Qty': t.exitQty ?? '',
    'Exit Date': t.exitDate ? new Date(t.exitDate).toLocaleString('en-IN') : '',
    'Realized P&L ₹': t.realizedPnl ?? '',
    'Exit Notes': t.exitDesc || '',
    'Tags': (t.tags || []).join(', '),
    'Created At': t.createdAt ? new Date(t.createdAt).toLocaleString('en-IN') : '',
    'Closed At': t.closedAt ? new Date(t.closedAt).toLocaleString('en-IN') : ''
  }));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(tradeRows), 'Trades');

  // Sheet 2: Core Portfolio
  const coreRows = state.portfolio.map((p, i) => ({
    '#': i + 1,
    'Symbol': p.symbol,
    'Trade Name': p.tradeName || '',
    'Qty': p.qty,
    'Avg Buy ₹': p.avgPrice,
    'Invested ₹': Number(p.qty) * Number(p.avgPrice),
    'Added At': p.addedAt ? new Date(p.addedAt).toLocaleString('en-IN') : ''
  }));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(coreRows), 'Core Portfolio');

  // Sheet 3: Priority
  const prioRows = state.priority.map((p, i) => ({
    '#': i + 1,
    'Symbol': p.symbol,
    'Category': p.category,
    'Setup': p.setup || '',
    'Trigger ₹': p.trigger ?? '',
    'Target ₹': p.target ?? '',
    'SL ₹': p.sl ?? '',
    'Notes': p.notes || '',
    'Added': p.createdAt ? new Date(p.createdAt).toLocaleString('en-IN') : ''
  }));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(prioRows), 'Priority');

  // Sheet 4: Watchlists
  const wlRows = [];
  state.watchlists.forEach(wl => {
    wl.symbols.forEach(s => {
      wlRows.push({
        'List Name': wl.name,
        'Symbol': s.symbol,
        'GTT Type': s.gtt?.type || '',
        'GTT Price ₹': s.gtt?.triggerPrice ?? '',
        'GTT Status': s.gtt?.status || '',
        'Notes': s.notes || '',
        'Added At': s.addedAt ? new Date(s.addedAt).toLocaleString('en-IN') : ''
      });
    });
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(wlRows.length ? wlRows : [{ 'List Name': '', 'Symbol': '' }]), 'Watchlists');

  // Sheet 5: Strategies
  const stratRows = state.strategies.map((s, i) => ({
    '#': i + 1,
    'Title': s.title,
    'Content': s.content,
    'Created At': s.createdAt ? new Date(s.createdAt).toLocaleString('en-IN') : '',
    'Updated At': s.updatedAt ? new Date(s.updatedAt).toLocaleString('en-IN') : ''
  }));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(stratRows.length ? stratRows : [{ '#': '', 'Title': '' }]), 'Strategies');

  // Sheet 6: Core Closed
  const coreClosedRows = (state.coreClosed || []).map((t, i) => ({
    '#': i + 1,
    'Symbol': t.symbol,
    'Category': t.category || '',
    'Trade Name': t.tradeName || '',
    'Avg Buy ₹': t.entryPrice,
    'Sell Price ₹': t.exitPrice,
    'Qty Sold': t.exitQty,
    'Realized P&L ₹': t.realizedPnl ?? '',
    'Buy Date': t.entryDate ? new Date(t.entryDate).toLocaleString('en-IN') : '',
    'Sell Date': t.closedAt ? new Date(t.closedAt).toLocaleString('en-IN') : '',
    'Exit Notes': t.exitDesc || ''
  }));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(coreClosedRows.length ? coreClosedRows : [{ '#': '', 'Symbol': '' }]), 'Core Closed');

  const wbout = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
  const blob = new Blob([wbout], { type: 'application/octet-stream' });
  downloadBlob(blob, `naz_trades_export_${todayDateStr()}.xlsx`);
  showToast('XLSX exported', 'success');
}

function exportCsv() {
  const cols = ['Symbol','Category','Status','Trade Name','Entry Price','Entry Qty','Entry Date','Exit Price','Exit Qty','Exit Date','Realized P&L','Tags','Notes'];
  const escapeCsv = (v) => {
    if (v === null || v === undefined) return '';
    const s = String(v);
    if (s.includes(',') || s.includes('"') || s.includes('\n')) return '"' + s.replace(/"/g, '""') + '"';
    return s;
  };
  const rows = state.trades.map(t => [
    t.symbol, t.category, t.status, t.tradeName || '',
    t.entryPrice, t.entryQty, t.entryDate,
    t.exitPrice ?? '', t.exitQty ?? '', t.exitDate ?? '',
    t.realizedPnl ?? '',
    (t.tags || []).join('; '),
    (t.entryDesc || '') + (t.exitDesc ? ' | EXIT: ' + t.exitDesc : '')
  ].map(escapeCsv).join(','));
  const csv = cols.join(',') + '\n' + rows.join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  downloadBlob(blob, `naz_trades_${todayDateStr()}.csv`);
  showToast('CSV exported', 'success');
}
