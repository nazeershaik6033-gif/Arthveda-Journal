function aiSimpleRunHTML(kind) {
  const desc = kind === 'reviewer'

    : 'Summarizes your performance: best/worst setups, win-rate by category & tag, rule adherence, and concrete suggestions.';
  const placeholder = kind === 'reviewer'
    ? 'Ask a specific question e.g. "Which setups lose me the most?" or "Focus on my FOMO trades"'
    : 'Ask e.g. "What is my best performing tag?" or "Compare my last 10 vs previous 10 trades"';
  return `

    ${aiPromptBox('aiRunFollowUp', placeholder, 'aiJournalFollowUp(\''+kind+'\')', 'Ask')}`;

function aiBuildJournalSummary() {
  const closed = [
    ...state.trades.filter(t => t.status === 'closed'),
    ...(state.coreClosed || [])
  ];
  if (closed.length === 0) return null;
  const lines = closed.slice(-60).map(t => {
    const ruleStr = t.ruleTagsExit ? Object.entries(t.ruleTagsExit).map(([rid, v]) => {
      const r = (state.rules || []).find(x => x.id === rid); return r ? `${r.name}:${v === 'followed' ? 'Y' : 'N'}` : '';
    }).filter(Boolean).join(', ') : '';
    return `${t.symbol} | ${t.category || 'stocks'} | ${(t.tradeName||'').slice(0,30)} | net ₹${Math.round(netPnl(t))} | tags:${(t.tags||[]).join('/')} | rules:${ruleStr}`;
  }).join('\n');
  const s = computeStats();
  return `Total closed: ${closed.length}. Win rate: ${s.winRate.toFixed(0)}%. Total net P&L: ₹${Math.round(s.totalRealized)}.\nRecent trades (symbol | category | setup | net | tags | rules followed):\n${lines}`;
}
async function aiRunJournal(kind) {
  if (aiBusy) return;
  if (!aiHasKey()) return showToast('Add an API key in Settings first', 'error');
  const out = document.getElementById('aiRunResult');
  const summary = aiBuildJournalSummary();
  if (!summary) { out.innerHTML = `<div class="ai-nokey">No closed trades yet to analyze.</div>`; return; }
  aiBusy = true;
  out.innerHTML = `<div class="ai-result ai-bubble thinking">Analyzing your journal…</div>`;
  const system = "You are a trading coach reviewing a trader's journal. Be specific, reference the data, and give actionable feedback. Plain text with short headings.";
  const ask = kind === 'reviewer'
    ? `Review these trades. Identify recurring mistakes, rule violations (rules followed are marked Y/N), overtrading, poor sizing, and emotional patterns. End with the top 3 things to fix.\n\n${summary}`
    : `Analyze this journal. Report: best & worst setups/tags, win-rate observations, whether following rules correlates with better P&L, and 3 concrete suggestions to improve.\n\n${summary}`;
  try {
    const reply = await callAI(system, [{ role: 'user', text: ask }]);
    out.innerHTML = `<div class="ai-result">${escapeHtml(reply)}</div>`;
  } catch (err) {
    out.innerHTML = `<div class="ai-nokey">⚠️ ${escapeHtml(err.message)}</div>`;
  }
  aiBusy = false;
}

/* ----- Provider API layer ----- */
async function callAI(systemPrompt, messages) {
  const ai = state.settings.ai;
  const provider = ai.provider;
  const key = ai.keys[provider];
  const model = ai.models[provider];
  if (!key) throw new Error('No API key set. Add one in Settings → AI Assistant.');
  if (provider === 'gemini') return callGemini(systemPrompt, messages, key, model);
  return callOpenRouter(systemPrompt, messages, key, model);
}
function aiStripDataUrl(dataUrl) {
  const i = dataUrl.indexOf(',');
  return { mime: (dataUrl.slice(5, dataUrl.indexOf(';')) || 'image/jpeg'), data: dataUrl.slice(i + 1) };
}
async function callGemini(systemPrompt, messages, key, model) {
  const contents = messages.map(m => {
    const parts = [];
    if (m.text) parts.push({ text: m.text });
    if (m.image) { const { mime, data } = aiStripDataUrl(m.image); parts.push({ inline_data: { mime_type: mime, data } }); }
    return { role: m.role === 'assistant' ? 'model' : 'user', parts };
  });
  const body = { contents, systemInstruction: { parts: [{ text: systemPrompt }] }, generationConfig: { temperature: 0.6 } };
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${encodeURIComponent(model)}:generateContent?key=${encodeURIComponent(key)}`;
  const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
  if (!res.ok) {
    let msg = `Gemini error ${res.status}`;
    try { const e = await res.json(); if (e.error && e.error.message) msg = e.error.message; } catch (_) {}
    throw new Error(msg);
  }
  const data = await res.json();
  const cand = data.candidates && data.candidates[0];
  const text = cand && cand.content && cand.content.parts ? cand.content.parts.map(p => p.text || '').join('') : '';
  if (!text) throw new Error('Empty response from Gemini (check model name or safety blocks).');
  return text;
}
async function callOpenRouter(systemPrompt, messages, key, model) {
  const msgs = [{ role: 'system', content: systemPrompt }];
  messages.forEach(m => {
    if (m.image) {
      msgs.push({ role: m.role === 'assistant' ? 'assistant' : 'user', content: [
        ...(m.text ? [{ type: 'text', text: m.text }] : []),
        { type: 'image_url', image_url: { url: m.image } }
      ] });
    } else {
      msgs.push({ role: m.role === 'assistant' ? 'assistant' : 'user', content: m.text });
    }
  });
  const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}`, 'X-Title': 'NazTrades' },
    body: JSON.stringify({ model, messages: msgs, temperature: 0.6 })
  });
  if (!res.ok) {
    let msg = `OpenRouter error ${res.status}`;
    try { const e = await res.json(); if (e.error && e.error.message) msg = e.error.message; } catch (_) {}
    throw new Error(msg);
  }
  const data = await res.json();
  const text = data.choices && data.choices[0] && data.choices[0].message ? data.choices[0].message.content : '';
  if (!text) throw new Error('Empty response from OpenRouter (model may not support this input).');
  return text;
}

function downloadJsonBackup() {
  const payload = {
    _version: 2,
    _exportedAt: new Date().toISOString(),
    _app: 'Naz Trades',
    ...state
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  downloadBlob(blob, `naz_trades_backup_${todayDateStr()}.json`);
  showToast('Backup downloaded', 'success');
}

async function restoreJsonFile(event) {
  const file = event.target.files[0];
  event.target.value = '';
  if (!file) return;
  try {
    const text = await file.text();
    const data = JSON.parse(text);
    const isMyTradesFormat = data && data.trades && !Array.isArray(data.trades) && (data.trades.live || data.trades.closed);
    if (!data || (!Array.isArray(data.trades) && !isMyTradesFormat)) {
      return showToast('Invalid backup file — expected Naz Trades or MyTrades JSON', 'error');
    }
    const isMyTrades = isMyTradesFormat;
    let tradeCount = 0;
    if (Array.isArray(data.trades)) {
      tradeCount = data.trades.length;
    } else if (isMyTrades) {
      const t = data.trades;
      ['stocks','futures','options'].forEach(c => {
        tradeCount += ((t.live||{})[c]||[]).length + ((t.closed||{})[c]||[]).length;
      });
    }
    const counts = {
      trades: tradeCount,
      portfolio: Array.isArray(data.portfolio) ? data.portfolio.length : 0,
      priority: Array.isArray(data.priority) ? data.priority.length : 0,
      watchlists: Array.isArray(data.watchlists) ? data.watchlists.length : 0,
      strategies: Array.isArray(data.strategies) ? data.strategies.length : 0,
    };
    showModal({
      title: 'Restore Backup',
      body: `
        <p style="color: var(--text-muted); font-size: 13px; margin: 0 0 12px;">
          This will <strong>replace all your current data</strong> with the contents of this backup. This action cannot be undone.
        </p>
        <div class="confirm-grid">
          <div class="confirm-grid-item"><div class="lbl">Trades</div><div class="val">${counts.trades}</div></div>
          <div class="confirm-grid-item"><div class="lbl">Holdings</div><div class="val">${counts.portfolio}</div></div>
          <div class="confirm-grid-item"><div class="lbl">Priority</div><div class="val">${counts.priority}</div></div>
          <div class="confirm-grid-item"><div class="lbl">Watchlists</div><div class="val">${counts.watchlists}</div></div>
          <div class="confirm-grid-item"><div class="lbl">Strategy notes</div><div class="val">${counts.strategies}</div></div>
          <div class="confirm-grid-item"><div class="lbl">Exported</div><div class="val" style="font-size: 11px;">${data._exportedAt ? new Date(data._exportedAt).toLocaleString('en-IN') : 'Unknown'}</div></div>
        </div>
      `,
      footer: `<button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-danger" id="confirmRestoreBtn">Yes, Restore</button>`
    });
    document.getElementById('confirmRestoreBtn').onclick = async () => {
      state = normalizeState(data);
      await saveState();
      closeModal();
      showToast('Backup restored', 'success');
      renderActivePanel();
    };
  } catch (e) {
    showToast('Failed to parse backup: ' + e.message, 'error');
  }
}

function exportXlsx() {
  if (typeof XLSX === 'undefined') return showToast('XLSX library not loaded', 'error');
  const wb = XLSX.utils.book_new();

  // Sheet 1: Trades
  const tradeRows = state.trades.map((t, i) => ({
    '#': i + 1,
    'Symbol': t.symbol,
    'Category': t.category,
    'Status': t.status,
    'Portfolio': t.portfolioType,
    'Trade Name': t.tradeName || '',
    'Entry Price ₹': t.entryPrice,
    'Entry Qty': t.entryQty,
    'Entry Date': t.entryDate ? new Date(t.entryDate).toLocaleString('en-IN') : '',
    'Entry Notes': t.entryDesc || '',
    'Exit Price ₹': t.exitPrice ?? '',
    'Exit Qty': t.exitQty ?? '',
    'Exit Date': t.exitDate ? new Date(t.exitDate).toLocaleString('en-IN') : '',
    'Realized P&L ₹': t.realizedPnl ?? '',
    'Exit Notes': t.exitDesc || '',
    'Tags': (t.tags || []).join(', '),
    'Created At': t.createdAt ? new Date(t.createdAt).toLocaleString('en-IN') : '',
    'Closed At': t.closedAt ? new Date(t.closedAt).toLocaleString('en-IN') : ''
  }));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(tradeRows), 'Trades');

  // Sheet 2: Core Portfolio
  const coreRows = state.portfolio.map((p, i) => ({
    '#': i + 1,
    'Symbol': p.symbol,
    'Trade Name': p.tradeName || '',
    'Qty': p.qty,
    'Avg Buy ₹': p.avgPrice,
    'Invested ₹': Number(p.qty) * Number(p.avgPrice),
    'Added At': p.addedAt ? new Date(p.addedAt).toLocaleString('en-IN') : ''
  }));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(coreRows), 'Core Portfolio');

  // Sheet 3: Priority
  const prioRows = state.priority.map((p, i) => ({
    '#': i + 1,
    'Symbol': p.symbol,
    'Category': p.category,
    'Setup': p.setup || '',
    'Trigger ₹': p.trigger ?? '',
    'Target ₹': p.target ?? '',
    'SL ₹': p.sl ?? '',
    'Notes': p.notes || '',
    'Added': p.createdAt ? new Date(p.createdAt).toLocaleString('en-IN') : ''
  }));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(prioRows), 'Priority');

  // Sheet 4: Watchlists
  const wlRows = [];
  state.watchlists.forEach(wl => {
    wl.symbols.forEach(s => {
      wlRows.push({
        'List Name': wl.name,
        'Symbol': s.symbol,
        'GTT Type': s.gtt?.type || '',
        'GTT Price ₹': s.gtt?.triggerPrice ?? '',
        'GTT Status': s.gtt?.status || '',
        'Notes': s.notes || '',
        'Added At': s.addedAt ? new Date(s.addedAt).toLocaleString('en-IN') : ''
      });
    });
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(wlRows.length ? wlRows : [{ 'List Name': '', 'Symbol': '' }]), 'Watchlists');

  // Sheet 5: Strategies
  const stratRows = state.strategies.map((s, i) => ({
    '#': i + 1,
    'Title': s.title,
    'Content': s.content,
    'Created At': s.createdAt ? new Date(s.createdAt).toLocaleString('en-IN') : '',
    'Updated At': s.updatedAt ? new Date(s.updatedAt).toLocaleString('en-IN') : ''
  }));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(stratRows.length ? stratRows : [{ '#': '', 'Title': '' }]), 'Strategies');

  // Sheet 6: Core Closed
  const coreClosedRows = (state.coreClosed || []).map((t, i) => ({
    '#': i + 1,
    'Symbol': t.symbol,
    'Category': t.category || '',
    'Trade Name': t.tradeName || '',
    'Avg Buy ₹': t.entryPrice,
    'Sell Price ₹': t.exitPrice,
    'Qty Sold': t.exitQty,
    'Realized P&L ₹': t.realizedPnl ?? '',
    'Buy Date': t.entryDate ? new Date(t.entryDate).toLocaleString('en-IN') : '',
    'Sell Date': t.closedAt ? new Date(t.closedAt).toLocaleString('en-IN') : '',
    'Exit Notes': t.exitDesc || ''
  }));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(coreClosedRows.length ? coreClosedRows : [{ '#': '', 'Symbol': '' }]), 'Core Closed');

  const wbout = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
  const blob = new Blob([wbout], { type: 'application/octet-stream' });
  downloadBlob(blob, `naz_trades_export_${todayDateStr()}.xlsx`);
  showToast('XLSX exported', 'success');
}

function exportCsv() {
  const cols = ['Symbol','Category','Status','Trade Name','Entry Price','Entry Qty','Entry Date','Exit Price','Exit Qty','Exit Date','Realized P&L','Tags','Notes'];
  const escapeCsv = (v) => {
    if (v === null || v === undefined) return '';
    const s = String(v);
    if (s.includes(',') || s.includes('"') || s.includes('\n')) return '"' + s.replace(/"/g, '""') + '"';
    return s;
  };
  const rows = state.trades.map(t => [
    t.symbol, t.category, t.status, t.tradeName || '',
    t.entryPrice, t.entryQty, t.entryDate,
    t.exitPrice ?? '', t.exitQty ?? '', t.exitDate ?? '',
    t.realizedPnl ?? '',
    (t.tags || []).join('; '),
    (t.entryDesc || '') + (t.exitDesc ? ' | EXIT: ' + t.exitDesc : '')
  ].map(escapeCsv).join(','));
  const csv = cols.join(',') + '\n' + rows.join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  downloadBlob(blob, `naz_trades_${todayDateStr()}.csv`);
  showToast('CSV exported', 'success');
}

/* ========================================================================
   ZERODHA TRADEBOOK IMPORT
   ======================================================================== */
async function importZerodhaTradebook(event) {
  const file = event.target.files[0];
  event.target.value = '';
  if (!file) return;
  if (typeof XLSX === 'undefined') return showToast('XLSX library not loaded', 'error');
  try {
    const buf = await readFileAsArrayBuffer(file);
    const wb = XLSX.read(buf, { type: 'array' });
    const sheet = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });

    // Find header row
    let headerIdx = -1;
    for (let i = 0; i < rows.length; i++) {
      const lower = rows[i].map(c => String(c).toLowerCase());
      if (lower.some(c => c.includes('symbol') || c.includes('tradingsymbol'))) { headerIdx = i; break; }
    }
    if (headerIdx === -1) return showToast('Could not find header row (looking for symbol/tradingsymbol column)', 'error');

    const header = rows[headerIdx].map(c => String(c).toLowerCase().trim());
    const symbolCol = header.findIndex(c => c === 'tradingsymbol' || c === 'symbol' || c.includes('symbol'));
    const typeCol = header.findIndex(c =>
      c === 'trade_type' || c === 'trade type' ||
      c.includes('trade_type') || c.includes('trade type') ||
      c.includes('transaction_type') || c.includes('transaction type') ||
      c === 'type' || c === 'order type' || c.includes('buy/sell') || c.includes('side') || c.includes('action')
    );
    const qtyCol = header.findIndex(c => c.includes('quantity') || c === 'qty' || c === 'vol' || c.includes('volume'));
    const priceCol = header.findIndex(c => c === 'price' || c === 'trade price' || c.includes('price'));
    const dateCol = header.findIndex(c => c.includes('date'));

    if (symbolCol < 0 || qtyCol < 0 || priceCol < 0 || typeCol < 0) {
      const missing = [];
      if (symbolCol < 0) missing.push('symbol/tradingsymbol');
      if (typeCol < 0) missing.push('trade_type / Trade Type');
      if (qtyCol < 0) missing.push('quantity');
      if (priceCol < 0) missing.push('price');
      return showToast(`Missing columns: ${missing.join(', ')}. Found: ${header.filter(Boolean).join(', ')}`, 'error');
    }

    // Parse all individual rows grouped by symbol (preserve order)
    const groupMap = {};
    const groupOrder = [];
    for (let i = headerIdx + 1; i < rows.length; i++) {
      const r = rows[i];
      const sym = String(r[symbolCol] || '').trim().toUpperCase();
      if (!sym) continue;
      const rawType = String(r[typeCol] || '').trim().toUpperCase();
      const qty = parseFloat(r[qtyCol]) || 0;
      const price = parseFloat(r[priceCol]) || 0;
      const date = dateCol >= 0 ? String(r[dateCol] || '').trim() : '';
      if (!qty || !price) continue;
      const isBuy = rawType === 'BUY' || rawType === 'B' || rawType === 'BUY ORDER' || rawType.startsWith('BUY');
      const isSell = rawType === 'SELL' || rawType === 'S' || rawType === 'SELL ORDER' || rawType.startsWith('SELL');
      if (!isBuy && !isSell) continue;
      if (!groupMap[sym]) { groupMap[sym] = { symbol: sym, rows: [] }; groupOrder.push(sym); }
      groupMap[sym].rows.push({ date, type: isBuy ? 'BUY' : 'SELL', qty, price, checked: true });
    }

    const symbols = groupOrder.map(s => groupMap[s]).filter(g => g.rows.some(r => r.type === 'BUY'));
    if (!symbols.length) return showToast('No buy trades found in this file', 'error');

    symbols.forEach(g => {
      // Aggregate individual rows into buy/sell totals (was missing — caused NaN/undefined)
      g.buyQty = 0; g.buyValue = 0; g.sellQty = 0; g.sellValue = 0;
      g.firstBuyDate = null; g.lastSellDate = null;
      g.rows.forEach(r => {
        if (r.type === 'BUY')  {
          g.buyQty  += r.qty; g.buyValue  += r.qty * r.price;
          if (!g.firstBuyDate || r.date < g.firstBuyDate) g.firstBuyDate = r.date;
        }
        if (r.type === 'SELL') {
          g.sellQty += r.qty; g.sellValue += r.qty * r.price;
          if (!g.lastSellDate || r.date > g.lastSellDate) g.lastSellDate = r.date;
        }
      });
      g.avgBuy = g.buyQty > 0 ? g.buyValue / g.buyQty : 0;
      // Clamp matched sell qty to what was actually bought (handles net-short edge case)
      g.netSellQty = Math.min(g.sellQty, g.buyQty);
      g.openQty = g.buyQty - g.netSellQty;
      g.avgSell = g.sellQty > 0 ? g.sellValue / g.sellQty : 0;
      // P&L on the matched (closed) portion: (avgSell - avgBuy) × netSellQty
      g.realizedPnl = g.netSellQty > 0 ? ((g.avgSell - g.avgBuy) * g.netSellQty) : null;
      g.status = g.openQty > 0 ? 'open' : 'closed';
      g.assignTo = g.openQty > 0 ? 'core' : 'satellite';
      // True when some shares were sold but position is still open (partial close)
      g.hasPartialClose = g.openQty > 0 && g.netSellQty > 0;
      // Detect if symbol already exists in portfolio or open trades
      g.existingPortfolio = (state.portfolio || []).find(p => p.symbol === g.symbol.toUpperCase() || p.symbol === g.symbol);
      g.existingTrade = (state.trades || []).find(t => t.status === 'open' && (t.symbol === g.symbol.toUpperCase() || t.symbol === g.symbol));
      g.isDuplicate = !!(g.existingPortfolio || g.existingTrade);
      // Default duplicates to skip to prevent accidental double-entries
      if (g.isDuplicate) g.assignTo = 'skip';
    });

    const dupCount = symbols.filter(g => g.isDuplicate).length;
    showModal({
      title: `Zerodha Import — ${symbols.length} symbol${symbols.length === 1 ? '' : 's'}`,
      size: 'lg',
      body: `
        ${dupCount > 0 ? `<p style="color:var(--warning,#f59e0b);font-size:13px;margin:0 0 10px;padding:8px 10px;background:rgba(245,158,11,.1);border-radius:6px;">⚠️ ${dupCount} symbol${dupCount > 1 ? 's' : ''} already exist in your portfolio/trades and are set to <strong>Skip</strong> by default. Choose <em>Update existing</em> to merge tradebook data into the existing entry instead of creating a duplicate.</p>` : ''}
        <p style="color: var(--text-muted); font-size: 13px; margin: 0 0 12px;">Check the entries you want to import and choose where each goes.</p>
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
          <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer;user-select:none;">
            <input type="checkbox" id="zerodhaSelectAll" checked style="width:16px;height:16px;cursor:pointer;" onchange="
              document.querySelectorAll('.z-row-cb').forEach(cb => {
                cb.checked = this.checked;
                const card = cb.closest('.z-import-card');
                card.style.opacity = this.checked ? '1' : '0.45';
                card.querySelector('.z-assign-sel').disabled = !this.checked;
              });
            "> Select All
          </label>
        </div>
        <div id="zerodhaTable" style="display:flex;flex-direction:column;gap:10px;">
          ${symbols.map((g, i) => {
            const pnlColor = g.realizedPnl === null ? '' : g.realizedPnl >= 0 ? 'color:var(--success,#22c55e)' : 'color:var(--danger,#ef4444)';
            const isChecked = g.assignTo !== 'skip';
            const dupBadge = g.isDuplicate ? `<span class="badge" style="background:var(--warning,#f59e0b);color:#000;font-size:10px;">exists</span>` : '';
            const statusBadge = `<span class="badge ${g.status === 'open' ? 'warning' : 'success'}">${g.hasPartialClose ? 'partial' : g.status}</span>`;
            return `
            <div class="z-import-card" style="border:1px solid var(--border);border-radius:10px;padding:12px 14px;background:var(--surface-3);opacity:${isChecked ? '1' : '0.45'};">
              <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
                <input type="checkbox" class="z-row-cb" data-idx="${i}" ${isChecked ? 'checked' : ''} style="width:18px;height:18px;flex-shrink:0;cursor:pointer;" onchange="
                  const card = this.closest('.z-import-card');
                  card.style.opacity = this.checked ? '1' : '0.45';
                  card.querySelector('.z-assign-sel').disabled = !this.checked;
                  const allCbs = document.querySelectorAll('.z-row-cb');
                  document.getElementById('zerodhaSelectAll').checked = [...allCbs].every(c => c.checked);
                ">
                <div style="flex:1;min-width:0;">
                  <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
                    <span style="font-weight:700;font-size:15px;font-family:var(--font-mono,monospace);">${escapeHtml(g.symbol)}</span>
                    ${dupBadge} ${statusBadge}
                  </div>
                </div>
                <select class="form-select z-assign-sel" data-idx="${i}" ${!isChecked ? 'disabled' : ''} style="padding:4px 8px;font-size:12px;max-width:140px;">
                  <option value="core" ${g.assignTo === 'core' ? 'selected' : ''}>Core (new)</option>
                  <option value="satellite" ${g.assignTo === 'satellite' ? 'selected' : ''}>Satellite (new)</option>
                  ${g.isDuplicate ? `<option value="update" ${g.assignTo === 'update' ? 'selected' : ''}>Update existing</option>` : ''}
                </select>
              </div>
              <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px 12px;">
                <div><div style="font-size:10px;color:var(--text-subtle);text-transform:uppercase;letter-spacing:.05em;">Buy Qty</div><div style="font-size:13px;font-weight:600;">${g.buyQty}</div></div>
                <div><div style="font-size:10px;color:var(--text-subtle);text-transform:uppercase;letter-spacing:.05em;">Avg Buy</div><div style="font-size:13px;font-weight:600;">${formatINR(g.avgBuy)}</div></div>
                <div><div style="font-size:10px;color:var(--text-subtle);text-transform:uppercase;letter-spacing:.05em;">Open Qty</div><div style="font-size:13px;font-weight:600;">${g.openQty}</div></div>
                ${g.netSellQty > 0 ? `
                <div><div style="font-size:10px;color:var(--text-subtle);text-transform:uppercase;letter-spacing:.05em;">Sell Qty</div><div style="font-size:13px;">${g.netSellQty}</div></div>
                <div><div style="font-size:10px;color:var(--text-subtle);text-transform:uppercase;letter-spacing:.05em;">Avg Sell</div><div style="font-size:13px;">${formatINR(g.avgSell)}</div></div>
                <div><div style="font-size:10px;color:var(--text-subtle);text-transform:uppercase;letter-spacing:.05em;">Realized P&amp;L</div><div style="font-size:13px;font-weight:600;${pnlColor}">${g.realizedPnl !== null ? formatPnl(g.realizedPnl) : '—'}</div></div>
                ` : ''}
              </div>
            </div>`;
          }).join('')}
        </div>
      `,
      footer: `<button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn" id="confirmZerodhaBtn">Import Selected</button>`
    });

    window._zSymbols = symbols;

    document.getElementById('confirmZerodhaBtn').onclick = async () => {
      let imported = 0;
      const now = new Date().toISOString();

      const pushClosedTrade = (g) => {
        state.trades.push({
          id: generateId(),
          portfolioType: 'satellite',
          status: 'closed',
          category: 'stocks',
          symbol: g.symbol,
          tradeName: 'Imported from Zerodha',
          entryPrice: g.avgBuy,
          entryQty: g.netSellQty,
          entryDate: g.firstBuyDate ? new Date(g.firstBuyDate).toISOString() : now,
          entryDesc: 'Auto-imported from Zerodha tradebook',
          exitPrice: g.avgSell,
          exitQty: g.netSellQty,
          exitDate: g.lastSellDate ? new Date(g.lastSellDate).toISOString() : now,
          realizedPnl: g.realizedPnl,
          commission: estimateCommission(g.netSellQty * (g.avgBuy + g.avgSell)),
          closedAt: g.lastSellDate ? new Date(g.lastSellDate).toISOString() : now,
          tags: ['zerodha-import'],
          createdAt: now
        });
      };

      document.querySelectorAll('#zerodhaTable .z-row-cb').forEach(cb => {
        if (!cb.checked) return;   // unchecked = skip
        const idx = parseInt(cb.dataset.idx);
        const sel = document.querySelector(`.z-assign-sel[data-idx="${idx}"]`);
        const choice = sel ? sel.value : 'satellite';
        const g = symbols[idx];

        if (choice === 'update') {
          // Merge tradebook data into the existing portfolio or open trade entry
          if (g.existingPortfolio) {
            const ep = g.existingPortfolio;
            const totalQty = Number(ep.qty) + (g.openQty || g.buyQty);
            const totalValue = Number(ep.qty) * Number(ep.avgPrice) + (g.openQty || g.buyQty) * g.avgBuy;
            ep.qty = totalQty;
            ep.avgPrice = totalQty > 0 ? totalValue / totalQty : g.avgBuy;
          } else if (g.existingTrade) {
            const et = g.existingTrade;
            const totalQty = Number(et.entryQty) + (g.openQty || g.buyQty);
            const totalValue = Number(et.entryQty) * Number(et.entryPrice) + (g.openQty || g.buyQty) * g.avgBuy;
            et.entryQty = totalQty;
            et.entryPrice = totalQty > 0 ? totalValue / totalQty : g.avgBuy;
          }
          // Still capture any realized P&L from sells even on an update
          if (g.hasPartialClose || g.netSellQty > 0) pushClosedTrade(g);
          imported++;
        } else if (choice === 'core') {
          // Core holding: remaining open shares only
          state.portfolio.push({
            id: generateId(),
            symbol: g.symbol,
            tradeName: 'Imported from Zerodha',
            qty: g.openQty || g.buyQty,
            avgPrice: g.avgBuy,
            addedAt: g.firstBuyDate ? new Date(g.firstBuyDate).toISOString() : now
          });
          // If shares were also sold, record that realized P&L as a closed satellite trade
          if (g.hasPartialClose) pushClosedTrade(g);
          imported++;
        } else {
          if (g.hasPartialClose) {
            // Partially closed: open satellite for remaining shares + closed record for sold portion
            state.trades.push({
              id: generateId(),
              portfolioType: 'satellite',
              status: 'open',
              category: 'stocks',
              symbol: g.symbol,
              tradeName: 'Imported from Zerodha',
              entryPrice: g.avgBuy,
              entryQty: g.openQty,
              entryDate: now,
              entryDesc: 'Auto-imported from Zerodha tradebook',
              exitPrice: null,
              exitQty: null,
              exitDate: null,
              realizedPnl: null,
              closedAt: null,
              tags: ['zerodha-import'],
              createdAt: now
            });
            pushClosedTrade(g);
          } else {
            // Fully closed or fully open satellite trade
            state.trades.push({
              id: generateId(),
              portfolioType: 'satellite',
              status: g.openQty > 0 ? 'open' : 'closed',
              category: 'stocks',
              symbol: g.symbol,
              tradeName: 'Imported from Zerodha',
              entryPrice: g.avgBuy,
              entryQty: g.openQty > 0 ? g.openQty : g.netSellQty,
              entryDate: now,
              entryDesc: 'Auto-imported from Zerodha tradebook',
              exitPrice: g.openQty > 0 ? null : g.avgSell,
              exitQty: g.openQty > 0 ? null : g.netSellQty,
              exitDate: g.openQty > 0 ? null : now,
              realizedPnl: g.openQty > 0 ? null : g.realizedPnl,
              closedAt: g.openQty > 0 ? null : now,
              tags: ['zerodha-import'],
              createdAt: now
            });
          }
          imported++;
        }
      });
      await saveState();
      closeModal();
      showToast(`Imported ${imported} symbol${imported === 1 ? '' : 's'}`, 'success');
      renderActivePanel();
    };
  } catch (e) {
    showToast('Failed to parse Zerodha file: ' + e.message, 'error');
  }
}

function zerodhaToggleRow(gi, ri, checked) {
  if (!window._zSymbols || !window._zSymbols[gi]) return;
  window._zSymbols[gi].rows[ri].checked = checked;
  const row = document.getElementById(`zr-${gi}-${ri}`);
  if (row) row.style.opacity = checked ? '1' : '0.35';
  zerodhaRefreshGroup(gi);
}

function zerodhaToggleAll(gi, checked) {
  if (!window._zSymbols || !window._zSymbols[gi]) return;
  const g = window._zSymbols[gi];
  g.rows.forEach((r, ri) => {
    r.checked = checked;
    const row = document.getElementById(`zr-${gi}-${ri}`);
    if (row) {
      row.style.opacity = checked ? '1' : '0.35';
      const cb = row.querySelector('input[type=checkbox]');
      if (cb) cb.checked = checked;
    }
  });
  zerodhaRefreshGroup(gi);
}

function zerodhaRefreshGroup(gi) {
  if (!window._zSymbols || !window._zCalc || !window._zLiveHtml) return;
  const g = window._zSymbols[gi];
  const sum = window._zCalc(g);
  const liveEl = document.getElementById(`zl-${gi}`);
  if (liveEl) liveEl.innerHTML = window._zLiveHtml(sum);
  const statusEl = document.getElementById(`zs-${gi}`);
  if (statusEl) { statusEl.textContent = sum.status.toUpperCase(); statusEl.className = `badge ${sum.status === 'open' ? 'warning' : 'success'}`; }
  const assignEl = document.getElementById(`za-${gi}`);
  if (assignEl && assignEl.value !== 'skip') assignEl.value = sum.status === 'open' ? 'core' : 'satellite';
}

/* ========================================================================
   BULK HOLDINGS IMPORT
   ======================================================================== */
let bulkRows = [];
function openBulkHoldingsModal() {
  bulkRows = [{ symbol: '', qty: '', avgPrice: '' }, { symbol: '', qty: '', avgPrice: '' }, { symbol: '', qty: '', avgPrice: '' }];
  let portfolioType = 'core';
  showModal({
    title: 'Bulk Holdings Import',
    size: 'lg',
    body: `
      <div class="form-group">
        <label class="form-label">Portfolio</label>
        <div class="toggle-group" id="bulkPortfolioToggle">
          <button class="toggle-btn active" data-val="core">Core</button>
          <button class="toggle-btn" data-val="satellite">Satellite</button>
        </div>
      </div>
      <div id="bulkRowsContainer"></div>
      <button class="btn btn-secondary btn-sm" onclick="addBulkRow()" style="margin-top: 8px;">+ Add Row</button>
    `,
    footer: `<button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn" id="bulkImportBtn">Import All</button>`
  });

  function renderBulk() {
    document.getElementById('bulkRowsContainer').innerHTML = bulkRows.map((r, i) => `
      <div style="display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 8px; margin-bottom: 8px; align-items: center;">
        <input class="form-input mono" placeholder="Symbol" value="${escapeHtml(r.symbol)}" data-bulk-idx="${i}" data-bulk-field="symbol" style="text-transform: uppercase;">
        <input class="form-input mono" type="number" placeholder="Qty" value="${r.qty}" data-bulk-idx="${i}" data-bulk-field="qty">
        <input class="form-input mono" type="number" step="0.01" placeholder="Avg Price" value="${r.avgPrice}" data-bulk-idx="${i}" data-bulk-field="avgPrice">
        <button class="btn btn-danger btn-sm" onclick="removeBulkRow(${i})">×</button>
      </div>
    `).join('');
    document.querySelectorAll('[data-bulk-idx]').forEach(inp => {
      inp.oninput = (e) => {
        const idx = parseInt(e.target.dataset.bulkIdx);
        const field = e.target.dataset.bulkField;
        bulkRows[idx][field] = e.target.value;
      };
    });
  }
  window.addBulkRow = () => { bulkRows.push({ symbol: '', qty: '', avgPrice: '' }); renderBulk(); };
  window.removeBulkRow = (i) => { bulkRows.splice(i, 1); renderBulk(); };
  renderBulk();

  document.querySelectorAll('#bulkPortfolioToggle .toggle-btn').forEach(b => {
    b.onclick = () => {
      portfolioType = b.dataset.val;
      document.querySelectorAll('#bulkPortfolioToggle .toggle-btn').forEach(x => x.classList.toggle('active', x === b));
    };
  });

  document.getElementById('bulkImportBtn').onclick = async () => {
    let added = 0;
    bulkRows.forEach(r => {
      const symbol = String(r.symbol || '').toUpperCase().trim();
      const qty = parseFloat(r.qty);
      const avgPrice = parseFloat(r.avgPrice);
      if (!symbol || isNaN(qty) || isNaN(avgPrice) || qty <= 0 || avgPrice <= 0) return;
      if (portfolioType === 'core') {
        state.portfolio.push({ id: generateId(), symbol, qty, avgPrice, tradeName: '', addedAt: new Date().toISOString() });
      } else {
        state.trades.push({
          id: generateId(), portfolioType: 'satellite', status: 'open', category: 'stocks',
          symbol, tradeName: '', entryPrice: avgPrice, entryQty: qty,
          entryDate: new Date().toISOString(), entryDesc: '', tags: [],
          createdAt: new Date().toISOString()
        });
      }
      added++;
    });
    if (!added) return showToast('No valid rows to import', 'error');
    await saveState();
    closeModal();
    showToast(`Added ${added} holding${added === 1 ? '' : 's'}`, 'success');
    renderActivePanel();
  };
}

function clearAllDataPrompt() {
  showConfirm('Clear All Data',
    'This will permanently delete <strong>everything</strong>: trades, holdings, priority setups, watchlists, strategy notes, and settings. This cannot be undone. Make sure you have a backup first!',
    async () => {
      state = JSON.parse(JSON.stringify(DEFAULT_STATE));
      await saveState();
      showToast('All data cleared', 'info');
      renderActivePanel();
    },
    'Yes, delete everything'
  );
}

/* ========================================================================
   GLOBAL SEARCH
   ======================================================================== */
function openSearchModal() {
  showModal({
    title: 'Search',
    body: `
      <input class="form-input" id="searchInput" placeholder="Search symbols, tags, notes..." autocomplete="off">
      <div id="searchResults" style="margin-top: 12px; max-height: 50vh; overflow-y: auto;"></div>
    `
  });
  document.getElementById('searchInput').focus();
  document.getElementById('searchInput').oninput = (e) => doSearch(e.target.value);
  doSearch('');
}

function doSearch(query) {
  const q = (query || '').toLowerCase().trim();
  const container = document.getElementById('searchResults');
  if (!q) {
    container.innerHTML = '<div style="color: var(--text-muted); font-size: 13px; padding: 12px;">Start typing to search.</div>';
    return;
  }
  const match = (str) => String(str || '').toLowerCase().includes(q);

  const tradeMatches = state.trades.filter(t =>
    match(t.symbol) || match(t.tradeName) || match(t.entryDesc) || match(t.exitDesc) || (t.tags || []).some(tag => match(tag))
  );
  const portfolioMatches = state.portfolio.filter(p => match(p.symbol) || match(p.tradeName));
  const priorityMatches = state.priority.filter(p => match(p.symbol) || match(p.setup) || match(p.notes));
  const wlMatches = [];
  state.watchlists.forEach(wl => wl.symbols.forEach(s => {
    if (match(s.symbol) || match(s.notes)) wlMatches.push({ ...s, listName: wl.name });
  }));
  const stratMatches = state.strategies.filter(s => match(s.title) || match(s.content));

  let html = '';
  const renderGroup = (label, items, fn) => {
    if (!items.length) return '';
    return `<div class="search-section-label">${label} (${items.length})</div>` + items.slice(0, 10).map(fn).join('');
  };

  html += renderGroup('Trades', tradeMatches, t => `
    <div class="search-result" onclick="closeModal(); switchTab('trades'); setSubTab('trades','${t.status === 'open' ? 'satellite-open' : 'satellite-closed'}')">
      <div><div class="mono" style="font-weight: 600;">${escapeHtml(t.symbol)}</div><div style="color: var(--text-muted); font-size: 11px;">${escapeHtml(t.tradeName || '')} ${(t.tags||[]).map(x=>'#'+x).join(' ')}</div></div>
      <span class="badge ${t.status === 'open' ? 'warning' : 'success'}">${t.status}</span>
    </div>
  `);
  html += renderGroup('Holdings', portfolioMatches, p => `
    <div class="search-result" onclick="closeModal(); switchTab('trades'); setSubTab('trades','core')">
      <div><div class="mono" style="font-weight: 600;">${escapeHtml(p.symbol)}</div><div style="color: var(--text-muted); font-size: 11px;">Core · ${p.qty} @ ${formatINR(p.avgPrice)}</div></div>
    </div>
  `);
  html += renderGroup('Priority', priorityMatches, p => `
    <div class="search-result" onclick="closeModal(); switchTab('priority')">
      <div><div class="mono" style="font-weight: 600;">${escapeHtml(p.symbol)}</div><div style="color: var(--text-muted); font-size: 11px;">${escapeHtml(p.setup || '')}</div></div>
    </div>
  `);
  html += renderGroup('Watchlist', wlMatches, s => `
    <div class="search-result" onclick="closeModal(); switchTab('watchlist')">
      <div><div class="mono" style="font-weight: 600;">${escapeHtml(s.symbol)}</div><div style="color: var(--text-muted); font-size: 11px;">${escapeHtml(s.listName)}</div></div>
    </div>
  `);
  html += renderGroup('Strategy Notes', stratMatches, s => `
    <div class="search-result" onclick="closeModal(); switchTab('strategy')">
      <div><div style="font-weight: 600;">${escapeHtml(s.title)}</div></div>
    </div>
  `);
  if (!html) html = '<div style="color: var(--text-muted); font-size: 13px; padding: 12px;">No results found.</div>';
  container.innerHTML = html;
}

/* ========================================================================
   INIT
   ======================================================================== */
async function init() {
  await loadState();
  applyTheme();
  applyFonts();
  renderTabs();
  // Restore the last tab/scroll (e.g. after returning from a TradingView chart,
  // which reloads this PWA); fall back to the Dashboard.
  let savedNav = null;
  try { savedNav = JSON.parse(localStorage.getItem('naz_nav_v1') || 'null'); } catch (e) {}
  // Restore the last tab, but never auto-open the Reader (Instapaper) on launch —
  // always land on Naz Trades' home instead.
  const validTab = savedNav && savedNav.tab && savedNav.tab !== 'reader' && TABS.some(t => t.id === savedNav.tab);
  if (validTab) {
    if (savedNav.subTrades) activeSubTab.trades = savedNav.subTrades;
    switchTab(savedNav.tab);
    if (savedNav.y) setTimeout(() => window.scrollTo(0, savedNav.y), 140);
  } else {
    switchTab('dashboard');
  }
  updateMarketStatus();
  setInterval(updateMarketStatus, 1000);
  setupAutoRefresh();
  document.getElementById('searchBtn').onclick = openSearchModal;
  document.getElementById('themeToggleBtn').onclick = toggleTheme;
  document.getElementById('menuBtn').onclick = openDrawer;
  document.getElementById('drawerCloseBtn').onclick = closeDrawer;
  document.getElementById('drawerOverlay').onclick = closeDrawer;
  document.getElementById('aiBtn').onclick = onAiClick;
  // Close the header dropdown when clicking anywhere outside it
  document.addEventListener('click', (e) => {
    const menu = document.getElementById('headerMenu');
    if (menu && menu.classList.contains('open') &&
        !menu.contains(e.target) && e.target.closest('#headerMenuBtn') === null) {
      closeHeaderMenu();
    }
  });
  // Keyboard shortcut: Cmd/Ctrl+K
  document.addEventListener('keydown', (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
      e.preventDefault();
      openSearchModal();
    }
    if (e.key === 'Escape') { closeModal(); closeDrawer(); }
  });
}

init();
</script>
