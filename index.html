function drawEquityCurve() {
  const canvas = document.getElementById('equityCanvas');
  if (!canvas) return;
  const closed = [
    ...state.trades.filter(t => t.status === 'closed' && t.closedAt),
    ...(state.coreClosed || []).filter(t => t.closedAt)
  ].sort((a, b) => new Date(a.closedAt) - new Date(b.closedAt));
  if (!closed.length) {
    const ctx = canvas.getContext('2d');
    canvas.width = canvas.offsetWidth * (window.devicePixelRatio || 1);
    canvas.height = 280 * (window.devicePixelRatio || 1);
    ctx.scale(window.devicePixelRatio || 1, window.devicePixelRatio || 1);
    ctx.fillStyle = '#64748b';
    ctx.font = '13px Inter, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('No closed trades yet', canvas.offsetWidth / 2, 140);
    return;
  }

  let cumulative = 0;
  const points = closed.map(t => {
    cumulative += Number(t.realizedPnl) || 0;
    return { date: new Date(t.closedAt), pnl: cumulative };
  });
  points.unshift({ date: new Date(points[0].date.getTime() - 86400000), pnl: 0 });

  const dpr = window.devicePixelRatio || 1;
  const w = canvas.offsetWidth;
  const h = 280;
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const padL = 70, padR = 14, padT = 14, padB = 30;
  const plotW = w - padL - padR;
  const plotH = h - padT - padB;

  const min = Math.min(0, ...points.map(p => p.pnl));
  const max = Math.max(0, ...points.map(p => p.pnl));
  const range = max - min || 1;

  const xScale = (i) => padL + (i / (points.length - 1)) * plotW;
  const yScale = (v) => padT + plotH - ((v - min) / range) * plotH;

  // Grid lines
  ctx.strokeStyle = '#1e293b';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 5; i++) {
    const y = padT + (plotH / 5) * i;
    ctx.beginPath();
    ctx.moveTo(padL, y);
    ctx.lineTo(w - padR, y);
    ctx.stroke();
    const val = max - (range / 5) * i;
    ctx.fillStyle = '#64748b';
    ctx.font = '11px JetBrains Mono, monospace';
    ctx.textAlign = 'right';
    ctx.fillText('₹' + Math.round(val).toLocaleString('en-IN'), padL - 8, y + 4);
  }

  // Zero line
  if (min < 0 && max > 0) {
    const zeroY = yScale(0);
    ctx.strokeStyle = '#94a3b8';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(padL, zeroY);
    ctx.lineTo(w - padR, zeroY);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // Line
  const ending = points[points.length - 1].pnl;
  const color = ending >= 0 ? '#22c55e' : '#ef4444';
  const colorRgb = ending >= 0 ? '34, 197, 94' : '239, 68, 68';

  // Gradient fill
  const grad = ctx.createLinearGradient(0, padT, 0, padT + plotH);
  grad.addColorStop(0, `rgba(${colorRgb}, 0.3)`);
  grad.addColorStop(1, `rgba(${colorRgb}, 0)`);
  ctx.beginPath();
  ctx.moveTo(xScale(0), yScale(points[0].pnl));
  for (let i = 1; i < points.length; i++) {
    ctx.lineTo(xScale(i), yScale(points[i].pnl));
  }
  ctx.lineTo(xScale(points.length - 1), padT + plotH);
  ctx.lineTo(xScale(0), padT + plotH);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  // Line on top
  ctx.beginPath();
  ctx.moveTo(xScale(0), yScale(points[0].pnl));
  for (let i = 1; i < points.length; i++) {
    ctx.lineTo(xScale(i), yScale(points[i].pnl));
  }
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.stroke();

  // End point dot
  ctx.beginPath();
  ctx.arc(xScale(points.length - 1), yScale(points[points.length - 1].pnl), 4, 0, Math.PI * 2);
  ctx.fillStyle = color;
  ctx.fill();
  ctx.strokeStyle = '#0f172a';
  ctx.lineWidth = 2;
  ctx.stroke();

  // X-axis labels
  ctx.fillStyle = '#64748b';
  ctx.font = '10px Inter, sans-serif';
  ctx.textAlign = 'center';
  const labelCount = Math.min(6, points.length);
  for (let i = 0; i < labelCount; i++) {
    const idx = Math.floor((i / (labelCount - 1)) * (points.length - 1));
    const d = points[idx].date;
    ctx.fillText(d.toLocaleString('en-IN', { day: '2-digit', month: 'short' }), xScale(idx), h - 10);
  }
}

/* ========================================================================
   THEME & FONT
   ======================================================================== */
function applyTheme(theme) {
  const isDark = (theme || state.settings.theme || 'dark') === 'dark';
  document.documentElement.classList.toggle('light', !isDark);
  // Swap sun/moon icons
  const sun = document.getElementById('iconSun');
  const moon = document.getElementById('iconMoon');
  if (sun) sun.style.display = isDark ? 'block' : 'none';
  if (moon) moon.style.display = isDark ? 'none' : 'block';
  // Update meta theme-color
  const meta = document.querySelector('meta[name="theme-color"]');
  if (meta) meta.setAttribute('content', isDark ? '#0f172a' : '#f1f5f9');
}

function toggleTheme() {
  const cur = state.settings.theme || 'dark';
  const next = cur === 'dark' ? 'light' : 'dark';
  state.settings.theme = next;
  applyTheme(next);
  saveState();
}

function setTheme(t) {
  state.settings.theme = t;
  applyTheme(t);
  saveState();
  renderSettings();
}

function applyFonts() {
  const s = state.settings;
  const textFont = s.textFont || 'Inter';
  const textSize = s.textSize || 14;
  const numFont = s.numFont || 'JetBrains Mono';
  const numSize = s.numSize || 13;
  document.documentElement.style.setProperty('--font-sans', `'${textFont}', ui-sans-serif, system-ui, sans-serif`);
  document.documentElement.style.setProperty('--font-mono', `'${numFont}', ui-monospace, Menlo, Consolas, monospace`);
  document.body.style.fontSize = textSize + 'px';
}

function setTextFont(f) {
  state.settings.textFont = f;
  applyFonts();
  saveState();
  const preview = document.getElementById('textFontPreview');
  if (preview) preview.style.fontFamily = `'${f}', sans-serif`;
}

function setTextSize(v) {
  const n = parseInt(v);
  state.settings.textSize = n;
  applyFonts();
  saveState();
  const lbl = document.getElementById('textSizeVal');
  if (lbl) lbl.textContent = n + 'px';
  const preview = document.getElementById('textFontPreview');
  if (preview) preview.style.fontSize = n + 'px';
}

function setNumFont(f) {
  state.settings.numFont = f;
  applyFonts();
  saveState();
  const preview = document.getElementById('numFontPreview');
  if (preview) preview.style.fontFamily = `'${f}', monospace`;
}

function setNumSize(v) {
  const n = parseInt(v);
  state.settings.numSize = n;
  applyFonts();
  saveState();
  const lbl = document.getElementById('numSizeVal');
  if (lbl) lbl.textContent = n + 'px';
  const preview = document.getElementById('numFontPreview');
  if (preview) preview.style.fontSize = n + 'px';
}

function setExchange(ex) {
  state.settings.exchange = ex;
  saveState();
  renderSettings();
}
function toggleAutoRefresh(on) {
  state.settings.autoRefresh = on;
  saveState();
  setupAutoRefresh();
  renderSettings();
  showToast(`Auto-refresh ${on ? 'enabled' : 'disabled'}`, 'success');
}
function setInterval_(m) {
  state.settings.refreshInterval = m;
  saveState();
  setupAutoRefresh();
  renderSettings();
}

function downloadJsonBackup() {
  const payload = {
    _version: 2,
    _exportedAt: new Date().toISOString(),
    _app: 'Naz Trades',
    ...state
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  downloadBlob(blob, `naz_trades_backup_${todayDateStr()}.json`);
  showToast('Backup downloaded', 'success');
}

async function restoreJsonFile(event) {
  const file = event.target.files[0];
  event.target.value = '';
  if (!file) return;
  try {
    const text = await file.text();
    const data = JSON.parse(text);
    if (!data || !Array.isArray(data.trades)) {
      return showToast('Invalid backup file (no trades array)', 'error');
    }
    const counts = {
      trades: data.trades.length,
      portfolio: Array.isArray(data.portfolio) ? data.portfolio.length : 0,
      priority: Array.isArray(data.priority) ? data.priority.length : 0,
      watchlists: Array.isArray(data.watchlists) ? data.watchlists.length : 0,
      strategies: Array.isArray(data.strategies) ? data.strategies.length : 0,
    };
    showModal({
      title: 'Restore Backup',
      body: `
        <p style="color: var(--text-muted); font-size: 13px; margin: 0 0 12px;">
          This will <strong>replace all your current data</strong> with the contents of this backup. This action cannot be undone.
        </p>
        <div class="confirm-grid">
          <div class="confirm-grid-item"><div class="lbl">Trades</div><div class="val">${counts.trades}</div></div>
          <div class="confirm-grid-item"><div class="lbl">Holdings</div><div class="val">${counts.portfolio}</div></div>
          <div class="confirm-grid-item"><div class="lbl">Priority</div><div class="val">${counts.priority}</div></div>
          <div class="confirm-grid-item"><div class="lbl">Watchlists</div><div class="val">${counts.watchlists}</div></div>
          <div class="confirm-grid-item"><div class="lbl">Strategy notes</div><div class="val">${counts.strategies}</div></div>
          <div class="confirm-grid-item"><div class="lbl">Exported</div><div class="val" style="font-size: 11px;">${data._exportedAt ? new Date(data._exportedAt).toLocaleString('en-IN') : 'Unknown'}</div></div>
        </div>
      `,
      footer: `<button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-danger" id="confirmRestoreBtn">Yes, Restore</button>`
    });
    document.getElementById('confirmRestoreBtn').onclick = async () => {
      state = normalizeState(data);
      await saveState();
      closeModal();
      showToast('Backup restored', 'success');
      renderActivePanel();
    };
  } catch (e) {
    showToast('Failed to parse backup: ' + e.message, 'error');
  }
}

function exportXlsx() {
  if (typeof XLSX === 'undefined') return showToast('XLSX library not loaded', 'error');
  const wb = XLSX.utils.book_new();

  // Sheet 1: Trades
  const tradeRows = state.trades.map((t, i) => ({
    '#': i + 1,
    'Symbol': t.symbol,
    'Category': t.category,
    'Status': t.status,
    'Portfolio': t.portfolioType,
    'Trade Name': t.tradeName || '',
    'Entry Price ₹': t.entryPrice,
    'Entry Qty': t.entryQty,
    'Entry Date': t.entryDate ? new Date(t.entryDate).toLocaleString('en-IN') : '',
    'Entry Notes': t.entryDesc || '',
    'Exit Price ₹': t.exitPrice ?? '',
    'Exit Qty': t.exitQty ?? '',
    'Exit Date': t.exitDate ? new Date(t.exitDate).toLocaleString('en-IN') : '',
    'Realized P&L ₹': t.realizedPnl ?? '',
    'Exit Notes': t.exitDesc || '',
    'Tags': (t.tags || []).join(', '),
    'Created At': t.createdAt ? new Date(t.createdAt).toLocaleString('en-IN') : '',
    'Closed At': t.closedAt ? new Date(t.closedAt).toLocaleString('en-IN') : ''
  }));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(tradeRows), 'Trades');

  // Sheet 2: Core Portfolio
  const coreRows = state.portfolio.map((p, i) => ({
    '#': i + 1,
    'Symbol': p.symbol,
    'Trade Name': p.tradeName || '',
    'Qty': p.qty,
    'Avg Buy ₹': p.avgPrice,
    'Invested ₹': Number(p.qty) * Number(p.avgPrice),
    'Added At': p.addedAt ? new Date(p.addedAt).toLocaleString('en-IN') : ''
  }));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(coreRows), 'Core Portfolio');

  // Sheet 3: Priority
  const prioRows = state.priority.map((p, i) => ({
    '#': i + 1,
    'Symbol': p.symbol,
    'Category': p.category,
    'Setup': p.setup || '',
    'Trigger ₹': p.trigger ?? '',
    'Target ₹': p.target ?? '',
    'SL ₹': p.sl ?? '',
    'Notes': p.notes || '',
    'Added': p.createdAt ? new Date(p.createdAt).toLocaleString('en-IN') : ''
  }));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(prioRows), 'Priority');

  // Sheet 4: Watchlists
  const wlRows = [];
  state.watchlists.forEach(wl => {
    wl.symbols.forEach(s => {
      wlRows.push({
        'List Name': wl.name,
        'Symbol': s.symbol,
        'GTT Type': s.gtt?.type || '',
        'GTT Price ₹': s.gtt?.triggerPrice ?? '',
        'GTT Status': s.gtt?.status || '',
        'Notes': s.notes || '',
        'Added At': s.addedAt ? new Date(s.addedAt).toLocaleString('en-IN') : ''
      });
    });
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(wlRows.length ? wlRows : [{ 'List Name': '', 'Symbol': '' }]), 'Watchlists');

  // Sheet 5: Strategies
  const stratRows = state.strategies.map((s, i) => ({
    '#': i + 1,
    'Title': s.title,
    'Content': s.content,
    'Created At': s.createdAt ? new Date(s.createdAt).toLocaleString('en-IN') : '',
    'Updated At': s.updatedAt ? new Date(s.updatedAt).toLocaleString('en-IN') : ''
  }));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(stratRows.length ? stratRows : [{ '#': '', 'Title': '' }]), 'Strategies');

  // Sheet 6: Core Closed
  const coreClosedRows = (state.coreClosed || []).map((t, i) => ({
    '#': i + 1,
    'Symbol': t.symbol,
    'Category': t.category || '',
    'Trade Name': t.tradeName || '',
    'Avg Buy ₹': t.entryPrice,
    'Sell Price ₹': t.exitPrice,
    'Qty Sold': t.exitQty,
    'Realized P&L ₹': t.realizedPnl ?? '',
    'Buy Date': t.entryDate ? new Date(t.entryDate).toLocaleString('en-IN') : '',
    'Sell Date': t.closedAt ? new Date(t.closedAt).toLocaleString('en-IN') : '',
    'Exit Notes': t.exitDesc || ''
  }));
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(coreClosedRows.length ? coreClosedRows : [{ '#': '', 'Symbol': '' }]), 'Core Closed');

  const wbout = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
  const blob = new Blob([wbout], { type: 'application/octet-stream' });
  downloadBlob(blob, `naz_trades_export_${todayDateStr()}.xlsx`);
  showToast('XLSX exported', 'success');
}

function exportCsv() {
  const cols = ['Symbol','Category','Status','Trade Name','Entry Price','Entry Qty','Entry Date','Exit Price','Exit Qty','Exit Date','Realized P&L','Tags','Notes'];
  const escapeCsv = (v) => {
    if (v === null || v === undefined) return '';
    const s = String(v);
    if (s.includes(',') || s.includes('"') || s.includes('\n')) return '"' + s.replace(/"/g, '""') + '"';
    return s;
  };
  const rows = state.trades.map(t => [
    t.symbol, t.category, t.status, t.tradeName || '',
    t.entryPrice, t.entryQty, t.entryDate,
    t.exitPrice ?? '', t.exitQty ?? '', t.exitDate ?? '',
    t.realizedPnl ?? '',
    (t.tags || []).join('; '),
    (t.entryDesc || '') + (t.exitDesc ? ' | EXIT: ' + t.exitDesc : '')
  ].map(escapeCsv).join(','));
  const csv = cols.join(',') + '\n' + rows.join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  downloadBlob(blob, `naz_trades_${todayDateStr()}.csv`);
  showToast('CSV exported', 'success');
}

/* ========================================================================
   ZERODHA TRADEBOOK IMPORT
   ======================================================================== */
async function importZerodhaTradebook(event) {
  const file = event.target.files[0];
  event.target.value = '';
  if (!file) return;
  if (typeof XLSX === 'undefined') return showToast('XLSX library not loaded', 'error');
  try {
    const buf = await readFileAsArrayBuffer(file);
    const wb = XLSX.read(buf, { type: 'array' });
    const sheet = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });

    // Find header row
    let headerIdx = -1;
    for (let i = 0; i < rows.length; i++) {
      const lower = rows[i].map(c => String(c).toLowerCase());
      if (lower.some(c => c.includes('symbol') || c.includes('tradingsymbol'))) {
        headerIdx = i;
        break;
      }
    }
    if (headerIdx === -1) return showToast('Could not find header row (looking for symbol/tradingsymbol column)', 'error');

    const header = rows[headerIdx].map(c => String(c).toLowerCase().trim());
    const symbolCol = header.findIndex(c => c === 'tradingsymbol' || c === 'symbol' || c.includes('symbol'));
    const typeCol = header.findIndex(c => c.includes('trade_type') || c.includes('buy') || c.includes('side'));
    const qtyCol = header.findIndex(c => c.includes('quantity') || c === 'qty');
    const priceCol = header.findIndex(c => c.includes('price'));
    const dateCol = header.findIndex(c => c.includes('date'));

    if (symbolCol < 0 || qtyCol < 0 || priceCol < 0 || typeCol < 0) {
      return showToast('Missing required columns (symbol, trade_type, quantity, price)', 'error');
    }

    // Group by symbol
    const groups = {};
    for (let i = headerIdx + 1; i < rows.length; i++) {
      const r = rows[i];
      const sym = String(r[symbolCol] || '').trim().toUpperCase();
      if (!sym) continue;
      const type = String(r[typeCol] || '').trim().toUpperCase();
      const qty = parseFloat(r[qtyCol]) || 0;
      const price = parseFloat(r[priceCol]) || 0;
      const date = r[dateCol] || '';
      if (!qty || !price) continue;
      if (!groups[sym]) groups[sym] = { symbol: sym, buyQty: 0, buyValue: 0, sellQty: 0, sellValue: 0, lastDate: '' };
      if (type === 'BUY' || type === 'B') {
        groups[sym].buyQty += qty;
        groups[sym].buyValue += qty * price;
      } else if (type === 'SELL' || type === 'S') {
        groups[sym].sellQty += qty;
        groups[sym].sellValue += qty * price;
      }
      if (date) groups[sym].lastDate = String(date);
    }

    const symbols = Object.values(groups).filter(g => g.buyQty > 0);
    if (!symbols.length) return showToast('No buy trades found in this file', 'error');

    symbols.forEach(g => {
      g.avgBuy = g.buyValue / g.buyQty;
      g.openQty = g.buyQty - g.sellQty;
      g.avgSell = g.sellQty > 0 ? g.sellValue / g.sellQty : 0;
      g.status = g.openQty > 0 ? 'open' : 'closed';
      g.assignTo = g.openQty > 0 ? 'core' : 'satellite';
    });

    showModal({
      title: `Zerodha Import — ${symbols.length} symbol${symbols.length === 1 ? '' : 's'} found`,
      size: 'lg',
      body: `
        <p style="color: var(--text-muted); font-size: 13px; margin: 0 0 12px;">Review and choose where each symbol goes. Open positions → Core Holdings. Fully closed → Satellite (logged as a closed trade).</p>
        <div class="table-wrap">
          <table class="data-table" id="zerodhaTable">
            <thead>
              <tr><th>Symbol</th><th>Buy Qty</th><th>Avg Buy</th><th>Open Qty</th><th>Status</th><th>Assign To</th></tr>
            </thead>
            <tbody>
              ${symbols.map((g, i) => `
                <tr>
                  <td>${escapeHtml(g.symbol)}</td>
                  <td>${g.buyQty}</td>
                  <td>${formatINR(g.avgBuy)}</td>
                  <td>${g.openQty}</td>
                  <td><span class="badge ${g.status === 'open' ? 'warning' : 'success'}">${g.status}</span></td>
                  <td>
                    <select class="form-select" data-idx="${i}" style="padding: 4px 8px; font-size: 12px;">
                      <option value="core" ${g.assignTo === 'core' ? 'selected' : ''}>Core</option>
                      <option value="satellite" ${g.assignTo === 'satellite' ? 'selected' : ''}>Satellite</option>
                      <option value="skip">Skip</option>
                    </select>
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `,
      footer: `<button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn" id="confirmZerodhaBtn">Import Selected</button>`
    });

    document.getElementById('confirmZerodhaBtn').onclick = async () => {
      let imported = 0;
      document.querySelectorAll('#zerodhaTable select').forEach(sel => {
        const idx = parseInt(sel.dataset.idx);
        const choice = sel.value;
        const g = symbols[idx];
        if (choice === 'skip') return;
        if (choice === 'core') {
          state.portfolio.push({
            id: generateId(),
            symbol: g.symbol,
            tradeName: 'Imported from Zerodha',
            qty: g.openQty || g.buyQty,
            avgPrice: g.avgBuy,
            addedAt: new Date().toISOString()
          });
          imported++;
        } else {
          state.trades.push({
            id: generateId(),
            portfolioType: 'satellite',
            status: g.openQty > 0 ? 'open' : 'closed',
            category: 'stocks',
            symbol: g.symbol,
            tradeName: 'Imported from Zerodha',
            entryPrice: g.avgBuy,
            entryQty: g.buyQty,
            entryDate: new Date().toISOString(),
            entryDesc: 'Auto-imported from Zerodha tradebook',
            exitPrice: g.openQty > 0 ? null : g.avgSell,
            exitQty: g.openQty > 0 ? null : g.sellQty,
            exitDate: g.openQty > 0 ? null : new Date().toISOString(),
            realizedPnl: g.openQty > 0 ? null : (g.sellValue - g.buyValue),
            closedAt: g.openQty > 0 ? null : new Date().toISOString(),
            tags: ['zerodha-import'],
            createdAt: new Date().toISOString()
          });
          imported++;
        }
      });
      await saveState();
      closeModal();
      showToast(`Imported ${imported} symbol${imported === 1 ? '' : 's'}`, 'success');
      renderActivePanel();
    };
  } catch (e) {
    showToast('Failed to parse Zerodha file: ' + e.message, 'error');
  }
}

/* ========================================================================
   BULK HOLDINGS IMPORT
   ======================================================================== */
let bulkRows = [];
function openBulkHoldingsModal() {
  bulkRows = [{ symbol: '', qty: '', avgPrice: '' }, { symbol: '', qty: '', avgPrice: '' }, { symbol: '', qty: '', avgPrice: '' }];
  let portfolioType = 'core';
  showModal({
    title: 'Bulk Holdings Import',
    size: 'lg',
    body: `
      <div class="form-group">
        <label class="form-label">Portfolio</label>
        <div class="toggle-group" id="bulkPortfolioToggle">
          <button class="toggle-btn active" data-val="core">Core</button>
          <button class="toggle-btn" data-val="satellite">Satellite</button>
        </div>
      </div>
      <div id="bulkRowsContainer"></div>
      <button class="btn btn-secondary btn-sm" onclick="addBulkRow()" style="margin-top: 8px;">+ Add Row</button>
    `,
    footer: `<button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn" id="bulkImportBtn">Import All</button>`
  });

  function renderBulk() {
    document.getElementById('bulkRowsContainer').innerHTML = bulkRows.map((r, i) => `
      <div style="display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 8px; margin-bottom: 8px; align-items: center;">
        <input class="form-input mono" placeholder="Symbol" value="${escapeHtml(r.symbol)}" data-bulk-idx="${i}" data-bulk-field="symbol" style="text-transform: uppercase;">
        <input class="form-input mono" type="number" placeholder="Qty" value="${r.qty}" data-bulk-idx="${i}" data-bulk-field="qty">
        <input class="form-input mono" type="number" step="0.01" placeholder="Avg Price" value="${r.avgPrice}" data-bulk-idx="${i}" data-bulk-field="avgPrice">
        <button class="btn btn-danger btn-sm" onclick="removeBulkRow(${i})">×</button>
      </div>
    `).join('');
    document.querySelectorAll('[data-bulk-idx]').forEach(inp => {
      inp.oninput = (e) => {
        const idx = parseInt(e.target.dataset.bulkIdx);
        const field = e.target.dataset.bulkField;
        bulkRows[idx][field] = e.target.value;
      };
    });
  }
  window.addBulkRow = () => { bulkRows.push({ symbol: '', qty: '', avgPrice: '' }); renderBulk(); };
  window.removeBulkRow = (i) => { bulkRows.splice(i, 1); renderBulk(); };
  renderBulk();

  document.querySelectorAll('#bulkPortfolioToggle .toggle-btn').forEach(b => {
    b.onclick = () => {
      portfolioType = b.dataset.val;
      document.querySelectorAll('#bulkPortfolioToggle .toggle-btn').forEach(x => x.classList.toggle('active', x === b));
    };
  });

  document.getElementById('bulkImportBtn').onclick = async () => {
    let added = 0;
    bulkRows.forEach(r => {
      const symbol = String(r.symbol || '').toUpperCase().trim();
      const qty = parseFloat(r.qty);
      const avgPrice = parseFloat(r.avgPrice);
      if (!symbol || isNaN(qty) || isNaN(avgPrice) || qty <= 0 || avgPrice <= 0) return;
      if (portfolioType === 'core') {
        state.portfolio.push({ id: generateId(), symbol, qty, avgPrice, tradeName: '', addedAt: new Date().toISOString() });
      } else {
        state.trades.push({
          id: generateId(), portfolioType: 'satellite', status: 'open', category: 'stocks',
          symbol, tradeName: '', entryPrice: avgPrice, entryQty: qty,
          entryDate: new Date().toISOString(), entryDesc: '', tags: [],
          createdAt: new Date().toISOString()
        });
      }
      added++;
    });
    if (!added) return showToast('No valid rows to import', 'error');
    await saveState();
    closeModal();
    showToast(`Added ${added} holding${added === 1 ? '' : 's'}`, 'success');
    renderActivePanel();
  };
}

function clearAllDataPrompt() {
  showConfirm('Clear All Data',
    'This will permanently delete <strong>everything</strong>: trades, holdings, priority setups, watchlists, strategy notes, and settings. This cannot be undone. Make sure you have a backup first!',
    async () => {
      state = JSON.parse(JSON.stringify(DEFAULT_STATE));
      await saveState();
      showToast('All data cleared', 'info');
      renderActivePanel();
    },
    'Yes, delete everything'
  );
}

/* ========================================================================
   GLOBAL SEARCH
   ======================================================================== */
function openSearchModal() {
  showModal({
    title: 'Search',
    body: `
      <input class="form-input" id="searchInput" placeholder="Search symbols, tags, notes..." autocomplete="off">
      <div id="searchResults" style="margin-top: 12px; max-height: 50vh; overflow-y: auto;"></div>
    `
  });
  document.getElementById('searchInput').focus();
  document.getElementById('searchInput').oninput = (e) => doSearch(e.target.value);
  doSearch('');
}

function doSearch(query) {
  const q = (query || '').toLowerCase().trim();
  const container = document.getElementById('searchResults');
  if (!q) {
    container.innerHTML = '<div style="color: var(--text-muted); font-size: 13px; padding: 12px;">Start typing to search.</div>';
    return;
  }
  const match = (str) => String(str || '').toLowerCase().includes(q);

  const tradeMatches = state.trades.filter(t =>
    match(t.symbol) || match(t.tradeName) || match(t.entryDesc) || match(t.exitDesc) || (t.tags || []).some(tag => match(tag))
  );
  const portfolioMatches = state.portfolio.filter(p => match(p.symbol) || match(p.tradeName));
  const priorityMatches = state.priority.filter(p => match(p.symbol) || match(p.setup) || match(p.notes));
  const wlMatches = [];
  state.watchlists.forEach(wl => wl.symbols.forEach(s => {
    if (match(s.symbol) || match(s.notes)) wlMatches.push({ ...s, listName: wl.name });
  }));
  const stratMatches = state.strategies.filter(s => match(s.title) || match(s.content));

  let html = '';
  const renderGroup = (label, items, fn) => {
    if (!items.length) return '';
    return `<div class="search-section-label">${label} (${items.length})</div>` + items.slice(0, 10).map(fn).join('');
  };

  html += renderGroup('Trades', tradeMatches, t => `
    <div class="search-result" onclick="closeModal(); switchTab('trades'); setSubTab('trades','${t.status === 'open' ? 'satellite-open' : 'satellite-closed'}')">
      <div><div class="mono" style="font-weight: 600;">${escapeHtml(t.symbol)}</div><div style="color: var(--text-muted); font-size: 11px;">${escapeHtml(t.tradeName || '')} ${(t.tags||[]).map(x=>'#'+x).join(' ')}</div></div>
      <span class="badge ${t.status === 'open' ? 'warning' : 'success'}">${t.status}</span>
    </div>
  `);
  html += renderGroup('Holdings', portfolioMatches, p => `
    <div class="search-result" onclick="closeModal(); switchTab('trades'); setSubTab('trades','core')">
      <div><div class="mono" style="font-weight: 600;">${escapeHtml(p.symbol)}</div><div style="color: var(--text-muted); font-size: 11px;">Core · ${p.qty} @ ${formatINR(p.avgPrice)}</div></div>
    </div>
  `);
  html += renderGroup('Priority', priorityMatches, p => `
    <div class="search-result" onclick="closeModal(); switchTab('priority')">
      <div><div class="mono" style="font-weight: 600;">${escapeHtml(p.symbol)}</div><div style="color: var(--text-muted); font-size: 11px;">${escapeHtml(p.setup || '')}</div></div>
    </div>
  `);
  html += renderGroup('Watchlist', wlMatches, s => `
    <div class="search-result" onclick="closeModal(); switchTab('watchlist')">
      <div><div class="mono" style="font-weight: 600;">${escapeHtml(s.symbol)}</div><div style="color: var(--text-muted); font-size: 11px;">${escapeHtml(s.listName)}</div></div>
    </div>
  `);
  html += renderGroup('Strategy Notes', stratMatches, s => `
    <div class="search-result" onclick="closeModal(); switchTab('strategy')">
      <div><div style="font-weight: 600;">${escapeHtml(s.title)}</div></div>
    </div>
  `);
  if (!html) html = '<div style="color: var(--text-muted); font-size: 13px; padding: 12px;">No results found.</div>';
  container.innerHTML = html;
}

/* ========================================================================
   INIT
   ======================================================================== */
async function init() {
  await loadState();
  applyTheme();
  applyFonts();
  renderTabs();
  switchTab('dashboard');
  updateMarketStatus();
  setInterval(updateMarketStatus, 1000);
  setupAutoRefresh();
  document.getElementById('searchBtn').onclick = openSearchModal;
  document.getElementById('quickAddBtn').onclick = () => switchTab('entry');
  document.getElementById('themeToggleBtn').onclick = toggleTheme;
  // Keyboard shortcut: Cmd/Ctrl+K
  document.addEventListener('keydown', (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
      e.preventDefault();
      openSearchModal();
    }
    if (e.key === 'Escape') closeModal();
  });
}

init();
</script>
