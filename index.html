async function importZerodhaTradebook(event) {
  const file = event.target.files[0];
  event.target.value = '';
  if (!file) return;
  if (typeof XLSX === 'undefined') return showToast('XLSX library not loaded', 'error');
  try {
    const buf = await readFileAsArrayBuffer(file);
    const wb = XLSX.read(buf, { type: 'array' });
    const sheet = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });

    // Find header row
    let headerIdx = -1;
    for (let i = 0; i < rows.length; i++) {
      const lower = rows[i].map(c => String(c).toLowerCase());
      if (lower.some(c => c.includes('symbol') || c.includes('tradingsymbol'))) { headerIdx = i; break; }
    }
    if (headerIdx === -1) return showToast('Could not find header row (looking for symbol/tradingsymbol column)', 'error');

    const header = rows[headerIdx].map(c => String(c).toLowerCase().trim());
    const symbolCol = header.findIndex(c => c === 'tradingsymbol' || c === 'symbol' || c.includes('symbol'));
    const typeCol = header.findIndex(c =>
      c === 'trade_type' || c === 'trade type' ||
      c.includes('trade_type') || c.includes('trade type') ||
      c.includes('transaction_type') || c.includes('transaction type') ||
      c === 'type' || c === 'order type' || c.includes('buy/sell') || c.includes('side') || c.includes('action')
    );
    const qtyCol = header.findIndex(c => c.includes('quantity') || c === 'qty' || c === 'vol' || c.includes('volume'));
    const priceCol = header.findIndex(c => c === 'price' || c === 'trade price' || c.includes('price'));
    const dateCol = header.findIndex(c => c.includes('date'));

    if (symbolCol < 0 || qtyCol < 0 || priceCol < 0 || typeCol < 0) {
      const missing = [];
      if (symbolCol < 0) missing.push('symbol/tradingsymbol');
      if (typeCol < 0) missing.push('trade_type / Trade Type');
      if (qtyCol < 0) missing.push('quantity');
      if (priceCol < 0) missing.push('price');
      return showToast(`Missing columns: ${missing.join(', ')}. Found: ${header.filter(Boolean).join(', ')}`, 'error');
    }

    // Parse all individual rows grouped by symbol (preserve order)
    const groupMap = {};
    const groupOrder = [];
    for (let i = headerIdx + 1; i < rows.length; i++) {
      const r = rows[i];
      const sym = String(r[symbolCol] || '').trim().toUpperCase();
      if (!sym) continue;
      const rawType = String(r[typeCol] || '').trim().toUpperCase();
      const qty = parseFloat(r[qtyCol]) || 0;
      const price = parseFloat(r[priceCol]) || 0;
      const date = dateCol >= 0 ? String(r[dateCol] || '').trim() : '';
      if (!qty || !price) continue;
      const isBuy = rawType === 'BUY' || rawType === 'B' || rawType === 'BUY ORDER' || rawType.startsWith('BUY');
      const isSell = rawType === 'SELL' || rawType === 'S' || rawType === 'SELL ORDER' || rawType.startsWith('SELL');
      if (!isBuy && !isSell) continue;
      if (!groupMap[sym]) { groupMap[sym] = { symbol: sym, rows: [] }; groupOrder.push(sym); }
      groupMap[sym].rows.push({ date, type: isBuy ? 'BUY' : 'SELL', qty, price, checked: true });
    }

    const symbols = groupOrder.map(s => groupMap[s]).filter(g => g.rows.some(r => r.type === 'BUY'));
    if (!symbols.length) return showToast('No buy trades found in this file', 'error');

    symbols.forEach(g => {
      g.avgBuy = g.buyValue / g.buyQty;
      // Clamp matched sell qty to what was actually bought (handles net-short edge case)
      g.netSellQty = Math.min(g.sellQty, g.buyQty);
      g.openQty = g.buyQty - g.netSellQty;
      g.avgSell = g.sellQty > 0 ? g.sellValue / g.sellQty : 0;
      // P&L on the matched (closed) portion: (avgSell - avgBuy) × netSellQty
      g.realizedPnl = g.netSellQty > 0 ? ((g.avgSell - g.avgBuy) * g.netSellQty) : null;
      g.status = g.openQty > 0 ? 'open' : 'closed';
      g.assignTo = g.openQty > 0 ? 'core' : 'satellite';
      // True when some shares were sold but position is still open (partial close)
      g.hasPartialClose = g.openQty > 0 && g.netSellQty > 0;
      // Detect if symbol already exists in portfolio or open trades
      g.existingPortfolio = (state.portfolio || []).find(p => p.symbol === g.symbol.toUpperCase() || p.symbol === g.symbol);
      g.existingTrade = (state.trades || []).find(t => t.status === 'open' && (t.symbol === g.symbol.toUpperCase() || t.symbol === g.symbol));
      g.isDuplicate = !!(g.existingPortfolio || g.existingTrade);
      // Default duplicates to skip to prevent accidental double-entries
      if (g.isDuplicate) g.assignTo = 'skip';
    });

    const dupCount = symbols.filter(g => g.isDuplicate).length;
    showModal({
      title: `Zerodha Import — ${symbols.length} symbol${symbols.length === 1 ? '' : 's'}`,
      size: 'lg',
      body: `
        ${dupCount > 0 ? `<p style="color:var(--warning,#f59e0b);font-size:13px;margin:0 0 10px;padding:8px 10px;background:rgba(245,158,11,.1);border-radius:6px;">⚠️ ${dupCount} symbol${dupCount > 1 ? 's' : ''} already exist in your portfolio/trades and are set to <strong>Skip</strong> by default. Choose <em>Update existing</em> to merge tradebook data into the existing entry instead of creating a duplicate.</p>` : ''}
        <p style="color: var(--text-muted); font-size: 13px; margin: 0 0 12px;">Review and choose where each symbol goes. Partial closes create both a core/open entry and a separate closed P&amp;L record.</p>
        <div class="table-wrap">
          <table class="data-table" id="zerodhaTable">
            <thead>
              <tr><th>Symbol</th><th>Buy Qty</th><th>Avg Buy</th><th>Sell Qty</th><th>Avg Sell</th><th>Open Qty</th><th>Realized P&amp;L</th><th>Status</th><th>Assign To</th></tr>
            </thead>
            <tbody>
              ${symbols.map((g, i) => {
                const pnlColor = g.realizedPnl === null ? '' : g.realizedPnl >= 0 ? 'color:var(--success,#22c55e)' : 'color:var(--danger,#ef4444)';
                const rowStyle = g.isDuplicate ? 'opacity:0.7' : '';
                const dupBadge = g.isDuplicate ? ' <span class="badge" style="background:var(--warning,#f59e0b);color:#000;font-size:10px;vertical-align:middle;">exists</span>' : '';
                return `
                <tr style="${rowStyle}">
                  <td>${escapeHtml(g.symbol)}${dupBadge}</td>
                  <td>${g.buyQty}</td>
                  <td>${formatINR(g.avgBuy)}</td>
                  <td>${g.netSellQty > 0 ? g.netSellQty : '—'}</td>
                  <td>${g.avgSell > 0 ? formatINR(g.avgSell) : '—'}</td>
                  <td>${g.openQty}</td>
                  <td style="${pnlColor}">${g.realizedPnl !== null ? formatINR(g.realizedPnl) : '—'}</td>
                  <td><span class="badge ${g.status === 'open' ? 'warning' : 'success'}">${g.hasPartialClose ? 'partial' : g.status}</span></td>
                  <td>
                    <select class="form-select" data-idx="${i}" style="padding: 4px 8px; font-size: 12px;">
                      <option value="core" ${g.assignTo === 'core' ? 'selected' : ''}>Core (new)</option>
                      <option value="satellite" ${g.assignTo === 'satellite' ? 'selected' : ''}>Satellite (new)</option>
                      ${g.isDuplicate ? `<option value="update" ${g.assignTo === 'update' ? 'selected' : ''}>Update existing</option>` : ''}
                      <option value="skip" ${g.assignTo === 'skip' ? 'selected' : ''}>Skip</option>
                    </select>
                  </td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>
      `,
      footer: `<button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn" id="confirmZerodhaBtn">Import Selected</button>`
    });

    window._zSymbols = symbols;

    document.getElementById('confirmZerodhaBtn').onclick = async () => {
      let imported = 0;
      const now = new Date().toISOString();

      const pushClosedTrade = (g) => {
        state.trades.push({
          id: generateId(),
          portfolioType: 'satellite',
          status: 'closed',
          category: 'stocks',
          symbol: g.symbol,
          tradeName: 'Imported from Zerodha',
          entryPrice: g.avgBuy,
          entryQty: g.netSellQty,
          entryDate: now,
          entryDesc: 'Auto-imported from Zerodha tradebook',
          exitPrice: g.avgSell,
          exitQty: g.netSellQty,
          exitDate: now,
          realizedPnl: g.realizedPnl,
          commission: estimateCommission(g.netSellQty * (g.avgBuy + g.avgSell)),
          closedAt: now,
          tags: ['zerodha-import'],
          createdAt: now
        });
      };

      document.querySelectorAll('#zerodhaTable select').forEach(sel => {
        const idx = parseInt(sel.dataset.idx);
        const choice = sel.value;
        const g = symbols[idx];
        if (choice === 'skip') return;

        if (choice === 'update') {
          // Merge tradebook data into the existing portfolio or open trade entry
          if (g.existingPortfolio) {
            const ep = g.existingPortfolio;
            const totalQty = Number(ep.qty) + (g.openQty || g.buyQty);
            const totalValue = Number(ep.qty) * Number(ep.avgPrice) + (g.openQty || g.buyQty) * g.avgBuy;
            ep.qty = totalQty;
            ep.avgPrice = totalQty > 0 ? totalValue / totalQty : g.avgBuy;
          } else if (g.existingTrade) {
            const et = g.existingTrade;
            const totalQty = Number(et.entryQty) + (g.openQty || g.buyQty);
            const totalValue = Number(et.entryQty) * Number(et.entryPrice) + (g.openQty || g.buyQty) * g.avgBuy;
            et.entryQty = totalQty;
            et.entryPrice = totalQty > 0 ? totalValue / totalQty : g.avgBuy;
          }
          // Still capture any realized P&L from sells even on an update
          if (g.hasPartialClose || g.netSellQty > 0) pushClosedTrade(g);
          imported++;
        } else if (choice === 'core') {
          // Core holding: remaining open shares only
          state.portfolio.push({
            id: generateId(),
            symbol: g.symbol,
            tradeName: 'Imported from Zerodha',
            qty: g.openQty || g.buyQty,
            avgPrice: g.avgBuy,
            addedAt: now
          });
          // If shares were also sold, record that realized P&L as a closed satellite trade
          if (g.hasPartialClose) pushClosedTrade(g);
          imported++;
        } else {
          if (g.hasPartialClose) {
            // Partially closed: open satellite for remaining shares + closed record for sold portion
            state.trades.push({
              id: generateId(),
              portfolioType: 'satellite',
              status: 'open',
              category: 'stocks',
              symbol: g.symbol,
              tradeName: 'Imported from Zerodha',
              entryPrice: g.avgBuy,
              entryQty: g.openQty,
              entryDate: now,
              entryDesc: 'Auto-imported from Zerodha tradebook',
              exitPrice: null,
              exitQty: null,
              exitDate: null,
              realizedPnl: null,
              closedAt: null,
              tags: ['zerodha-import'],
              createdAt: now
            });
            pushClosedTrade(g);
          } else {
            // Fully closed or fully open satellite trade
            state.trades.push({
              id: generateId(),
              portfolioType: 'satellite',
              status: g.openQty > 0 ? 'open' : 'closed',
              category: 'stocks',
              symbol: g.symbol,
              tradeName: 'Imported from Zerodha',
              entryPrice: g.avgBuy,
              entryQty: g.openQty > 0 ? g.openQty : g.netSellQty,
              entryDate: now,
              entryDesc: 'Auto-imported from Zerodha tradebook',
              exitPrice: g.openQty > 0 ? null : g.avgSell,
              exitQty: g.openQty > 0 ? null : g.netSellQty,
              exitDate: g.openQty > 0 ? null : now,
              realizedPnl: g.openQty > 0 ? null : g.realizedPnl,
              closedAt: g.openQty > 0 ? null : now,
              tags: ['zerodha-import'],
              createdAt: now
            });
          }
          imported++;
        }
      });
      await saveState();
      closeModal();
      showToast(`Imported ${imported} symbol${imported === 1 ? '' : 's'}`, 'success');
      renderActivePanel();
    };
  } catch (e) {
    showToast('Failed to parse Zerodha file: ' + e.message, 'error');
  }
}

function zerodhaToggleRow(gi, ri, checked) {
  if (!window._zSymbols || !window._zSymbols[gi]) return;
  window._zSymbols[gi].rows[ri].checked = checked;
  const row = document.getElementById(`zr-${gi}-${ri}`);
  if (row) row.style.opacity = checked ? '1' : '0.35';
  zerodhaRefreshGroup(gi);
}

function zerodhaToggleAll(gi, checked) {
  if (!window._zSymbols || !window._zSymbols[gi]) return;
  const g = window._zSymbols[gi];
  g.rows.forEach((r, ri) => {
    r.checked = checked;
    const row = document.getElementById(`zr-${gi}-${ri}`);
    if (row) {
      row.style.opacity = checked ? '1' : '0.35';
      const cb = row.querySelector('input[type=checkbox]');
      if (cb) cb.checked = checked;
    }
  });
  zerodhaRefreshGroup(gi);
}

function zerodhaRefreshGroup(gi) {
  if (!window._zSymbols || !window._zCalc || !window._zLiveHtml) return;
  const g = window._zSymbols[gi];
  const sum = window._zCalc(g);
  const liveEl = document.getElementById(`zl-${gi}`);
  if (liveEl) liveEl.innerHTML = window._zLiveHtml(sum);
  const statusEl = document.getElementById(`zs-${gi}`);
  if (statusEl) { statusEl.textContent = sum.status.toUpperCase(); statusEl.className = `badge ${sum.status === 'open' ? 'warning' : 'success'}`; }
  const assignEl = document.getElementById(`za-${gi}`);
  if (assignEl && assignEl.value !== 'skip') assignEl.value = sum.status === 'open' ? 'core' : 'satellite';
}

/* ========================================================================
   BULK HOLDINGS IMPORT
   ======================================================================== */
let bulkRows = [];
function openBulkHoldingsModal() {
  bulkRows = [{ symbol: '', qty: '', avgPrice: '' }, { symbol: '', qty: '', avgPrice: '' }, { symbol: '', qty: '', avgPrice: '' }];
  let portfolioType = 'core';
  showModal({
    title: 'Bulk Holdings Import',
    size: 'lg',
    body: `
      <div class="form-group">
        <label class="form-label">Portfolio</label>
        <div class="toggle-group" id="bulkPortfolioToggle">
          <button class="toggle-btn active" data-val="core">Core</button>
          <button class="toggle-btn" data-val="satellite">Satellite</button>
        </div>
      </div>
      <div id="bulkRowsContainer"></div>
      <button class="btn btn-secondary btn-sm" onclick="addBulkRow()" style="margin-top: 8px;">+ Add Row</button>
    `,
    footer: `<button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn" id="bulkImportBtn">Import All</button>`
  });

  function renderBulk() {
    document.getElementById('bulkRowsContainer').innerHTML = bulkRows.map((r, i) => `
      <div style="display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 8px; margin-bottom: 8px; align-items: center;">
        <input class="form-input mono" placeholder="Symbol" value="${escapeHtml(r.symbol)}" data-bulk-idx="${i}" data-bulk-field="symbol" style="text-transform: uppercase;">
        <input class="form-input mono" type="number" placeholder="Qty" value="${r.qty}" data-bulk-idx="${i}" data-bulk-field="qty">
        <input class="form-input mono" type="number" step="0.01" placeholder="Avg Price" value="${r.avgPrice}" data-bulk-idx="${i}" data-bulk-field="avgPrice">
        <button class="btn btn-danger btn-sm" onclick="removeBulkRow(${i})">×</button>
      </div>
    `).join('');
    document.querySelectorAll('[data-bulk-idx]').forEach(inp => {
      inp.oninput = (e) => {
        const idx = parseInt(e.target.dataset.bulkIdx);
        const field = e.target.dataset.bulkField;
        bulkRows[idx][field] = e.target.value;
      };
    });
  }
  window.addBulkRow = () => { bulkRows.push({ symbol: '', qty: '', avgPrice: '' }); renderBulk(); };
  window.removeBulkRow = (i) => { bulkRows.splice(i, 1); renderBulk(); };
  renderBulk();

  document.querySelectorAll('#bulkPortfolioToggle .toggle-btn').forEach(b => {
    b.onclick = () => {
      portfolioType = b.dataset.val;
      document.querySelectorAll('#bulkPortfolioToggle .toggle-btn').forEach(x => x.classList.toggle('active', x === b));
    };
  });

  document.getElementById('bulkImportBtn').onclick = async () => {
    let added = 0;
    bulkRows.forEach(r => {
      const symbol = String(r.symbol || '').toUpperCase().trim();
      const qty = parseFloat(r.qty);
      const avgPrice = parseFloat(r.avgPrice);
      if (!symbol || isNaN(qty) || isNaN(avgPrice) || qty <= 0 || avgPrice <= 0) return;
      if (portfolioType === 'core') {
        state.portfolio.push({ id: generateId(), symbol, qty, avgPrice, tradeName: '', addedAt: new Date().toISOString() });
      } else {
        state.trades.push({
          id: generateId(), portfolioType: 'satellite', status: 'open', category: 'stocks',
          symbol, tradeName: '', entryPrice: avgPrice, entryQty: qty,
          entryDate: new Date().toISOString(), entryDesc: '', tags: [],
          createdAt: new Date().toISOString()
        });
      }
      added++;
    });
    if (!added) return showToast('No valid rows to import', 'error');
    await saveState();
    closeModal();
    showToast(`Added ${added} holding${added === 1 ? '' : 's'}`, 'success');
    renderActivePanel();
  };
}

function clearAllDataPrompt() {
  showConfirm('Clear All Data',
    'This will permanently delete <strong>everything</strong>: trades, holdings, priority setups, watchlists, strategy notes, and settings. This cannot be undone. Make sure you have a backup first!',
    async () => {
      state = JSON.parse(JSON.stringify(DEFAULT_STATE));
      await saveState();
      showToast('All data cleared', 'info');
      renderActivePanel();
    },
    'Yes, delete everything'
  );
}

/* ========================================================================
   GLOBAL SEARCH
   ======================================================================== */
function openSearchModal() {
  showModal({
    title: 'Search',
    body: `
      <input class="form-input" id="searchInput" placeholder="Search symbols, tags, notes..." autocomplete="off">
      <div id="searchResults" style="margin-top: 12px; max-height: 50vh; overflow-y: auto;"></div>
    `
  });
  document.getElementById('searchInput').focus();
  document.getElementById('searchInput').oninput = (e) => doSearch(e.target.value);
  doSearch('');
}

function doSearch(query) {
  const q = (query || '').toLowerCase().trim();
  const container = document.getElementById('searchResults');
  if (!q) {
    container.innerHTML = '<div style="color: var(--text-muted); font-size: 13px; padding: 12px;">Start typing to search.</div>';
    return;
  }
  const match = (str) => String(str || '').toLowerCase().includes(q);

  const tradeMatches = state.trades.filter(t =>
    match(t.symbol) || match(t.tradeName) || match(t.entryDesc) || match(t.exitDesc) || (t.tags || []).some(tag => match(tag))
  );
  const portfolioMatches = state.portfolio.filter(p => match(p.symbol) || match(p.tradeName));
  const priorityMatches = state.priority.filter(p => match(p.symbol) || match(p.setup) || match(p.notes));
  const wlMatches = [];
  state.watchlists.forEach(wl => wl.symbols.forEach(s => {
    if (match(s.symbol) || match(s.notes)) wlMatches.push({ ...s, listName: wl.name });
  }));
  const stratMatches = state.strategies.filter(s => match(s.title) || match(s.content));

  let html = '';
  const renderGroup = (label, items, fn) => {
    if (!items.length) return '';
    return `<div class="search-section-label">${label} (${items.length})</div>` + items.slice(0, 10).map(fn).join('');
  };

  html += renderGroup('Trades', tradeMatches, t => `
    <div class="search-result" onclick="closeModal(); switchTab('trades'); setSubTab('trades','${t.status === 'open' ? 'satellite-open' : 'satellite-closed'}')">
      <div><div class="mono" style="font-weight: 600;">${escapeHtml(t.symbol)}</div><div style="color: var(--text-muted); font-size: 11px;">${escapeHtml(t.tradeName || '')} ${(t.tags||[]).map(x=>'#'+x).join(' ')}</div></div>
      <span class="badge ${t.status === 'open' ? 'warning' : 'success'}">${t.status}</span>
    </div>
  `);
  html += renderGroup('Holdings', portfolioMatches, p => `
    <div class="search-result" onclick="closeModal(); switchTab('trades'); setSubTab('trades','core')">
      <div><div class="mono" style="font-weight: 600;">${escapeHtml(p.symbol)}</div><div style="color: var(--text-muted); font-size: 11px;">Core · ${p.qty} @ ${formatINR(p.avgPrice)}</div></div>
    </div>
  `);
  html += renderGroup('Priority', priorityMatches, p => `
    <div class="search-result" onclick="closeModal(); switchTab('priority')">
      <div><div class="mono" style="font-weight: 600;">${escapeHtml(p.symbol)}</div><div style="color: var(--text-muted); font-size: 11px;">${escapeHtml(p.setup || '')}</div></div>
    </div>
  `);
  html += renderGroup('Watchlist', wlMatches, s => `
    <div class="search-result" onclick="closeModal(); switchTab('watchlist')">
      <div><div class="mono" style="font-weight: 600;">${escapeHtml(s.symbol)}</div><div style="color: var(--text-muted); font-size: 11px;">${escapeHtml(s.listName)}</div></div>
    </div>
  `);
  html += renderGroup('Strategy Notes', stratMatches, s => `
    <div class="search-result" onclick="closeModal(); switchTab('strategy')">
      <div><div style="font-weight: 600;">${escapeHtml(s.title)}</div></div>
    </div>
  `);
  if (!html) html = '<div style="color: var(--text-muted); font-size: 13px; padding: 12px;">No results found.</div>';
  container.innerHTML = html;
}

/* ========================================================================
   INIT
   ======================================================================== */
async function init() {
  await loadState();
  applyTheme();
  applyFonts();
  renderTabs();
  // Restore the last tab/scroll (e.g. after returning from a TradingView chart,
  // which reloads this PWA); fall back to the Dashboard.
  let savedNav = null;
  try { savedNav = JSON.parse(localStorage.getItem('naz_nav_v1') || 'null'); } catch (e) {}
  const validTab = savedNav && savedNav.tab && TABS.some(t => t.id === savedNav.tab);
  if (validTab) {
    if (savedNav.subTrades) activeSubTab.trades = savedNav.subTrades;
    switchTab(savedNav.tab);
    if (savedNav.y) setTimeout(() => window.scrollTo(0, savedNav.y), 140);
  } else {
    switchTab('dashboard');
  }
  updateMarketStatus();
  setInterval(updateMarketStatus, 1000);
  setupAutoRefresh();
  document.getElementById('searchBtn').onclick = openSearchModal;
  document.getElementById('readerBtn').onclick = openReaderMenu;
  document.getElementById('themeToggleBtn').onclick = toggleTheme;
  document.getElementById('menuBtn').onclick = openDrawer;
  document.getElementById('drawerCloseBtn').onclick = closeDrawer;
  document.getElementById('drawerOverlay').onclick = closeDrawer;
  document.getElementById('fabBtn').onclick = () => switchTab('entry');
  document.getElementById('aiBtn').onclick = onAiClick;
  document.getElementById('headerMenuBtn').onclick = (e) => { e.stopPropagation(); toggleHeaderMenu(); };
  // Close the header dropdown when clicking anywhere outside it
  document.addEventListener('click', (e) => {
    const menu = document.getElementById('headerMenu');
    if (menu && menu.classList.contains('open') &&
        !menu.contains(e.target) && e.target.closest('#headerMenuBtn') === null) {
      closeHeaderMenu();
    }
  });
  // Keyboard shortcut: Cmd/Ctrl+K
  document.addEventListener('keydown', (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
      e.preventDefault();
      openSearchModal();
    }
    if (e.key === 'Escape') { closeModal(); closeDrawer(); }
  });
}

init();
